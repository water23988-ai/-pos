<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 快速結帳系統 V2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fcfbf9; color: #4a4a4a; padding-bottom: 140px; overflow-x: hidden; }
        
        .btn-action { 
            border: 2px solid #e5e7eb; background: white; border-radius: 12px; 
            padding: 14px 8px; font-size: 14px; transition: all 0.2s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-action.active { border-color: #8e9775; background-color: #f1f3eb; color: #6d7756; font-weight: bold; box-shadow: 0 2px 8px rgba(142,151,117,0.1); }
        
        .checkout-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: #2e2926; color: white; padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="bg-white border-b-2 border-[#8e9775] p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div id="adminTrigger" class="select-none">
            <h1 class="text-lg font-bold text-[#8e9775]">🌸 拾逅花事 POS</h1>
            <p id="statusInfo" class="text-[10px] text-gray-400 italic">系統連接中...</p>
        </div>
        <div class="text-[9px] text-gray-300">SECURE V2.1</div>
    </div>

    <div class="p-4 space-y-8">
        
        <section>
            <h2 class="text-xs font-bold mb-3 text-gray-400 tracking-widest uppercase">📍 營運據點</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setStore('台南FOCUS')" class="btn-action store-btn">台南FOCUS</button>
                <button onclick="setStore('高雄FOCUS 13')" class="btn-action store-btn">高雄FOCUS 13</button>
            </div>
        </section>

        <section class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="text-xs font-bold mb-4 text-gray-400 tracking-widest uppercase text-center">🌸 商品選單</h2>
            <div id="categoryGrid" class="grid grid-cols-3 gap-2 mb-6"></div>

            <div id="productSection" class="hidden border-t border-dashed pt-5">
                <div class="flex justify-between items-center mb-4">
                    <span id="currentCatLabel" class="font-bold text-[#8e9775] border-l-4 border-[#8e9775] pl-2"></span>
                    <button onclick="closeProducts()" class="text-xs text-gray-300 bg-gray-50 px-3 py-1 rounded-full">✕ 關閉</button>
                </div>
                <div id="productGrid" class="grid grid-cols-2 gap-2 max-h-[400px] overflow-y-auto no-scrollbar"></div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-6">
            <section>
                <h2 class="text-xs font-bold mb-3 text-gray-400 tracking-widest uppercase">💳 支付方式</h2>
                <div class="space-y-2">
                    <button onclick="setPayment('現金')" class="btn-action pay-btn w-full">現金</button>
                    <button onclick="setPayment('LINEPAY')" class="btn-action pay-btn w-full">LINEPAY</button>
                    <button onclick="setPayment('匯款')" class="btn-action pay-btn w-full">匯款</button>
                </div>
            </section>
            <section>
                <h2 class="text-xs font-bold mb-3 text-gray-400 tracking-widest uppercase">📣 客源統計</h2>
                <div class="space-y-2">
                    <button onclick="setSource('路過')" class="btn-action source-btn w-full text-xs">路過</button>
                    <button onclick="setSource('IG/FB')" class="btn-action source-btn w-full text-xs">IG/FB</button>
                    <button onclick="setSource('朋友介紹')" class="btn-action source-btn w-full text-xs">朋友</button>
                </div>
            </section>
        </div>
    </div>

    <div class="checkout-bar">
        <div class="flex flex-col">
            <div id="summaryText" class="text-[10px] text-gray-400 mb-1 tracking-tighter uppercase">載入中...</div>
            <div id="totalDisplay" class="text-2xl font-bold text-[#DFC07A]">NT$ 0</div>
        </div>
        <button onclick="processCheckout()" id="checkoutBtn" class="bg-[#8e9775] px-8 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
            確認結帳
        </button>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[200] flex items-center justify-center p-6">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg text-[#8e9775]">老闆專屬後台</h3>
                <button onclick="closeSettings()" class="text-gray-300">✕</button>
            </div>
            <div class="bg-gray-50 p-4 rounded-2xl mb-6 text-xs">
                <label class="font-bold text-gray-400 mb-2 block">API URL (SECRET)</label>
                <input type="password" id="apiUrlInput" class="w-full border border-gray-200 rounded-xl px-4 py-2 mb-3">
                <button onclick="saveSettings()" class="w-full bg-[#8e9775] text-white py-2 rounded-xl font-bold">儲存 API</button>
            </div>
            <hr class="mb-6 border-dashed">
            <div class="space-y-4">
                <h4 class="font-bold text-sm italic">📊 營業額查詢</h4>
                <div class="flex gap-2">
                    <input type="date" id="reportDate" class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-xs">
                    <button onclick="getDailyReport()" class="bg-gray-100 text-[#8e9775] px-4 py-2 rounded-xl text-xs font-bold">查詢</button>
                </div>
                <div id="reportDisplay" class="bg-[#fcfbf9] rounded-2xl border border-gray-100 p-4 min-h-[100px]">
                    <p class="text-center text-gray-300 text-[10px] py-8">僅限老闆查閱數據</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let API_URL = localStorage.getItem('moment_flor_api') || '';
        let currentStore = localStorage.getItem('moment_flor_store') || '台南FOCUS';
        let selectedPayment = '現金';
        let selectedSource = '路過';
        let cart = [];
        let rawProducts = []; // 儲存 GAS 的原始資料
        const ADMIN_PASSWORD = "1234"; 

        window.onload = () => {
            setStore(currentStore);
            setPayment('現金');
            setSource('路過');
            document.getElementById('reportDate').valueAsDate = new Date();
            if(API_URL) fetchProducts();
        };

        // 長按 3 秒標題進入後台
        let pressTimer;
        const trigger = document.getElementById('adminTrigger');
        ['touchstart', 'mousedown'].forEach(evt => {
            trigger.addEventListener(evt, () => {
                pressTimer = setTimeout(() => {
                    const pw = prompt("身份認證：");
                    if (pw === ADMIN_PASSWORD) document.getElementById('settingsModal').classList.remove('hidden');
                }, 3000);
            });
        });
        ['touchend', 'mouseup', 'mouseleave'].forEach(evt => trigger.addEventListener(evt, () => clearTimeout(pressTimer)));

        function setStore(val) {
            currentStore = val;
            localStorage.setItem('moment_flor_store', val);
            updateBtnActive('.store-btn', val);
            updateSummary();
            if (rawProducts.length > 0) renderCategories(); // 切換門市時重新渲染（因為價格會變）
        }

        function setPayment(val) { selectedPayment = val; updateBtnActive('.pay-btn', val); updateSummary(); }
        function setSource(val) { selectedSource = val; updateBtnActive('.source-btn', val); updateSummary(); }

        function updateBtnActive(cls, val) {
            document.querySelectorAll(cls).forEach(btn => btn.classList.toggle('active', btn.innerText.includes(val)));
        }

        function updateSummary() {
            document.getElementById('summaryText').innerText = `${currentStore} | ${selectedPayment} | ${selectedSource}`;
        }

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}?action=getProducts`);
                rawProducts = await res.json();
                document.getElementById('statusInfo').innerText = '✅ 連線正常';
                renderCategories();
            } catch (e) {
                document.getElementById('statusInfo').innerText = '❌ API 連線錯誤';
            }
        }

        function renderCategories() {
            const cats = [...new Set(rawProducts.map(p => p.category))];
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = cats.map(cat => `
                <button onclick="openProducts('${cat}')" class="btn-action">
                    <span class="text-[10px] font-bold">${cat}</span>
                </button>
            `).join('');
        }

        function openProducts(cat) {
            document.getElementById('productSection').classList.remove('hidden');
            document.getElementById('currentCatLabel').innerText = cat;
            const grid = document.getElementById('productGrid');
            
            // 根據門市自動對齊 GAS 欄位 (priceTN/priceKH, stockTN/stockKH)
            const list = rawProducts.filter(p => p.category === cat).map(p => ({
                id: p.id,
                name: p.name,
                price: currentStore === '台南FOCUS' ? p.priceTN : p.priceKH,
                stock: currentStore === '台南FOCUS' ? p.stockTN : p.stockKH
            }));

            grid.innerHTML = list.map(p => `
                <button onclick="addToCart('${p.name}', ${p.price}, ${p.id})" class="btn-action items-start p-3 border-gray-100 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between w-full items-start">
                        <span class="font-bold text-xs text-left leading-tight mb-2">${p.name}</span>
                        <span class="text-[8px] bg-gray-100 px-1 rounded text-gray-400">餘:${p.stock}</span>
                    </div>
                    <span class="text-[#8e9775] font-bold">$${p.price}</span>
                </button>
            `).join('');
        }

        function addToCart(name, price, id) {
            cart.push({ name, price, id, qty: 1 });
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalDisplay').innerText = `NT$ ${total.toLocaleString()}`;
            document.getElementById('checkoutBtn').innerText = `確認結帳 (${cart.length})`;
        }

        async function processCheckout() {
            if (cart.length === 0) return alert('請先點選商品');
            const btn = document.getElementById('checkoutBtn');
            btn.disabled = true;
            btn.innerText = '處理中...';

            const payload = {
                action: 'addTransaction',
                data: {
                    id: 'T' + Date.now(),
                    date: new Date().toISOString(),
                    store: currentStore,
                    total: cart.reduce((sum, i) => sum + i.price, 0),
                    pay: selectedPayment,
                    source: selectedSource,
                    items: cart.map(i => ({ id: i.id, name: i.name, qty: 1, unitPrice: i.price }))
                }
            };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert('✨ 結帳成功');
                cart = [];
                document.getElementById('totalDisplay').innerText = `NT$ 0`;
                document.getElementById('checkoutBtn').innerText = '確認結帳';
                closeProducts();
                fetchProducts(); // 重新抓取庫存
            } catch (e) {
                alert('連線失敗，請檢查網路');
            } finally { btn.disabled = false; }
        }

        async function getDailyReport() {
            const date = document.getElementById('reportDate').value;
            const display = document.getElementById('reportDisplay');
            display.innerHTML = '<p class="text-center text-xs py-8 animate-pulse">讀取中...</p>';
            try {
                const res = await fetch(`${API_URL}?action=getDailyReport&date=${date}&store=${currentStore}`);
                const d = await res.json();
                display.innerHTML = `
                    <div class="text-xs space-y-2">
                        <div class="flex justify-between border-b pb-1"><span>今日營收</span><span class="font-bold text-[#8e9775]">$${d.revenue.toLocaleString()}</span></div>
                        <div class="flex justify-between border-b pb-1"><span>客單價</span><span class="font-bold">$${d.customers > 0 ? Math.round(d.revenue/d.customers) : 0}</span></div>
                        <div class="flex justify-between border-b pb-1"><span>新/舊客</span><span>${d.newCount} / ${d.memberCount}</span></div>
                    </div>
                `;
            } catch (e) { display.innerHTML = '<p class="text-center text-red-400 py-8">無法讀取報表</p>'; }
        }

        function closeProducts() { document.getElementById('productSection').classList.add('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function saveSettings() {
            const url = document.getElementById('apiUrlInput').value.trim();
            if(url) {
                localStorage.setItem('moment_flor_api', url);
                API_URL = url;
                fetchProducts();
                alert("API 設定成功");
            }
        }
    </script>
</body>
</html>
