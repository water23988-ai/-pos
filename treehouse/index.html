<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拾逅樹洞｜Moment Flor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0;
    --cream2: #F5EDE0;
    --warm-brown: #8B6E52;
    --dark-brown: #3D2B1F;
    --sage: #8A9E7E;
    --blush: #D4A5A0;
    --muted-blush: #C9928A;
    --ivory: #FDF9F4;
    --text-main: #2E1F14;
    --text-muted: #8B7263;
    --border: rgba(139,110,82,0.2);
    --border-focus: rgba(139,110,82,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── logo protection ── */
  img {
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    pointer-events: none;
    -webkit-touch-callout: none;
    -webkit-user-drag: none;
  }

  html, body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-main);
    height: 100%;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  /* ───── VIEWS ───── */
  .view { display: none; min-height: 100dvh; }
  .view.active { display: flex; flex-direction: column; }

  /* ───── LANDING ───── */
  #view-landing {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
    background: var(--ivory);
  }

  #view-landing::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,165,160,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  #view-landing::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 250px; height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(138,158,126,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .landing-inner {
    max-width: 400px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
    padding: 0 4px;
  }

  .brand-tag {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .tree-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap {
    position: relative;
    width: 72px;
    margin: 0 auto 1.5rem;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  .brand-logo {
    width: 72px;
    display: block;
    opacity: 0.85;
  }

  .hold-ring {
    position: absolute;
    bottom: -6px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 3px;
    background: var(--warm-brown);
    border-radius: 2px;
    transition: width 0s;
    opacity: 0;
  }
  .hold-ring.active {
    opacity: 0.5;
    transition: width 2s linear, opacity 0.1s;
    width: 72px;
  }

  .main-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--dark-brown);
    line-height: 1.4;
    margin-bottom: 0.75rem;
  }

  .main-title em {
    font-style: italic;
    font-family: 'Playfair Display', serif;
    color: var(--warm-brown);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 2.5rem;
  }

  .reward-box {
    background: var(--cream2);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    box-shadow: 0 3px 12px rgba(61,43,31,0.07);
  }

  .reward-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .reward-text {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  .reward-text strong {
    font-weight: 500;
    color: var(--dark-brown);
    display: block;
    margin-bottom: 2px;
  }

  /* ── ripple & transitions ── */
  .btn-primary, .mood-btn {
    overflow: hidden;
  }
  .ripple-ring {
    position: fixed;
    border-radius: 50%;
    background: rgba(61,43,31,0.12);
    transform: scale(0);
    animation: ripple-out 0.55s ease-out forwards;
    pointer-events: none;
    z-index: 200;
  }
  @keyframes ripple-out {
    to { transform: scale(1); opacity: 0; }
  }

  .btn-primary {
    width: 100%;
    padding: 16px 20px;
    background: var(--dark-brown);
    color: var(--cream);
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    margin-bottom: 0.75rem;
    box-shadow: 0 4px 16px rgba(61,43,31,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 54px;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:hover { background: #5a3d2d; }

  .btn-ghost {
    width: 100%;
    padding: 13px 20px;
    background: var(--ivory);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-ghost:active { transform: scale(0.97); }
  .btn-ghost:hover {
    border-color: var(--border-focus);
    color: var(--warm-brown);
    background: var(--cream2);
  }

  /* ───── FORM ───── */
  #view-form {
    background: var(--ivory);
  }

  .form-header {
    padding: 1.5rem 1.5rem 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .back-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--border-focus); color: var(--dark-brown); }

  .form-header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-muted);
  }

  .form-body {
    padding: 1.25rem 1.25rem 2rem;
    flex: 1;
  }

  .mood-question {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--dark-brown);
    margin-bottom: 1rem;
    line-height: 1.6;
  }

  .mood-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .mood-btn {
    flex: 1;
    padding: 16px 8px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    background: var(--ivory);
    cursor: pointer;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 10px rgba(61,43,31,0.06);
    min-height: 88px;
    justify-content: center;
  }
  .mood-btn:active { transform: scale(0.96); }
  .mood-btn span.emoji { font-size: 28px; line-height: 1; }
  .mood-btn.selected-joy {
    border-color: var(--sage);
    background: rgba(138,158,126,0.1);
    color: #4a6b3e;
    box-shadow: 0 2px 12px rgba(138,158,126,0.2);
  }
  .mood-btn.selected-sad {
    border-color: var(--blush);
    background: rgba(212,165,160,0.12);
    color: #7a4040;
    box-shadow: 0 2px 12px rgba(212,165,160,0.2);
  }

  .field-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: block;
  }

  .field-wrap {
    margin-bottom: 1.25rem;
  }

  textarea, input[type=text] {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    line-height: 1.7;
    box-shadow: 0 2px 8px rgba(61,43,31,0.05);
    -webkit-appearance: none;
  }
  textarea:focus, input[type=text]:focus {
    border-color: var(--border-focus);
  }
  textarea::placeholder, input::placeholder {
    color: rgba(139,110,82,0.4);
    font-size: 13px;
  }

  .consent-box {
    background: var(--cream2);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    box-shadow: 0 2px 8px rgba(61,43,31,0.05);
  }

  .consent-box input[type=checkbox] {
    width: 16px; height: 16px;
    margin-top: 2px;
    accent-color: var(--warm-brown);
    flex-shrink: 0;
    cursor: pointer;
  }

  .consent-text {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .consent-text strong {
    font-weight: 500;
    color: var(--dark-brown);
  }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    opacity: 0.6;
  }

  /* ───── SUCCESS ───── */
  #view-success {
    align-items: center;
    justify-content: center;
    background: var(--ivory);
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: background 1.2s ease;
  }
  #view-success.mood-joy { background: #eef4ea; }
  #view-success.mood-sad { background: #f4ede7; }

  .success-inner {
    max-width: 340px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* ── envelope ── */
  .env-scene {
    width: 180px;
    height: 120px;
    margin: 0 auto 2rem;
    position: relative;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .env-scene.show { opacity: 1; transform: translateY(0); }

  .env-body {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 90px;
    background: #f5ece2;
    border: 1.5px solid rgba(139,110,82,0.22);
    border-radius: 3px 3px 5px 5px;
  }
  /* left triangle */
  .env-body::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    border-style: solid;
    border-width: 45px 0 45px 52px;
    border-color: transparent transparent transparent rgba(139,110,82,0.08);
  }
  /* right triangle */
  .env-body::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 0;
    border-style: solid;
    border-width: 45px 52px 45px 0;
    border-color: transparent rgba(139,110,82,0.08) transparent transparent;
  }

  /* flap — drawn as an upward-pointing triangle via clip-path */
  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 62px;
    background: #e8d9cc;
    border: 1.5px solid rgba(139,110,82,0.22);
    border-bottom: none;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 3;
  }
  .env-flap.open { transform: rotateX(-170deg); }

  .env-letter {
    position: absolute;
    left: 18px; right: 18px;
    bottom: 8px;
    height: 72px;
    background: #fff;
    border: 1px solid rgba(139,110,82,0.15);
    border-radius: 2px;
    transform: translateY(0px);
    transition: transform 0.65s cubic-bezier(0.34, 1.4, 0.64, 1);
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    padding: 10px 12px;
  }
  .env-letter.open { transform: translateY(-56px); }
  .env-letter-line {
    height: 2px;
    border-radius: 1px;
    background: rgba(139,110,82,0.18);
  }
  .env-letter-line:nth-child(1) { width: 75%; }
  .env-letter-line:nth-child(2) { width: 55%; }
  .env-letter-line:nth-child(3) { width: 68%; }

  /* ── joy bloom icon ── */
  .joy-icon {
    font-size: 0;
    margin-bottom: 2rem;
    transition: font-size 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    line-height: 1;
  }
  .joy-icon.show { font-size: 58px; }

  /* ── shared text ── */
  .success-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--dark-brown);
    line-height: 1.6;
    margin-bottom: 1rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .success-title.show { opacity: 1; transform: translateY(0); }

  .success-subtitle {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.9;
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .success-subtitle.show { opacity: 1; transform: translateY(0); }

  .success-cta {
    width: 100%;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .success-cta.show { opacity: 1; transform: translateY(0); }

  .ig-cta {
    display: block;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: white;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  .ig-cta:hover { opacity: 0.9; }
  .ig-cta .ig-handle {
    display: block;
    font-size: 11px;
    opacity: 0.85;
    margin-top: 3px;
    letter-spacing: 1px;
  }

/* ───── ADMIN ───── */
  #view-admin {
    background: var(--cream);
    padding: 0;
  }

  .admin-header {
    background: var(--dark-brown);
    color: var(--cream);
    padding: 1rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .admin-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .admin-header span {
    font-size: 11px;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }

  .admin-filters {
    padding: 1rem 1.25rem;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--ivory);
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--dark-brown);
    color: var(--cream);
    border-color: var(--dark-brown);
  }

  .admin-list {
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
  }

  .entry-card {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .entry-card:hover {
    box-shadow: 0 2px 12px rgba(61,43,31,0.08);
  }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .entry-mood-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-joy {
    background: rgba(138,158,126,0.15);
    color: #4a6b3e;
  }
  .tag-sad {
    background: rgba(212,165,160,0.2);
    color: #7a4040;
  }

  .entry-meta {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .entry-content {
    font-size: 13.5px;
    color: var(--text-main);
    line-height: 1.75;
    margin-bottom: 10px;
    white-space: pre-wrap;
  }

  .entry-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ig-share-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(188,24,136,0.1);
    color: #bc1888;
    font-weight: 500;
  }

  .no-share-badge {
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.5;
  }

  .action-btns {
    display: flex;
    gap: 6px;
  }

  .act-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .act-btn:hover {
    border-color: var(--warm-brown);
    color: var(--warm-brown);
  }
  .act-btn.copy-btn:hover {
    background: var(--warm-brown);
    border-color: var(--warm-brown);
    color: white;
  }

  .admin-login {
    position: fixed; inset: 0;
    background: var(--ivory);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    z-index: 100;
  }

  .admin-login-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }

  .admin-login-box h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--dark-brown);
    margin-bottom: 0.5rem;
  }

  .admin-login-box p {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .admin-login-box input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-main);
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 1rem;
  }

  .admin-login-box input:focus { border-color: var(--border-focus); }

  .admin-empty {
    text-align: center;
    padding: 3rem 1.5rem;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.8;
  }

  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--dark-brown);
    color: var(--cream);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 12px;
    transition: transform 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LANDING VIEW -->
<div id="view-landing" class="view active">
  <div class="landing-inner">
    <p class="brand-tag">FOCUS 13 × 拾逅花事</p>
    <div class="logo-wrap" id="logo-trigger"

  try {
    const raw = localStorage.getItem('treehouse_entries');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

// ─── VIEWS ───
function showView(name, fromEl) {
  if (name === 'form' && fromEl) {
    playHoleTransition(fromEl, () => {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-form').classList.add('active');
      currentMood = ''; resetForm();
    });
  } else {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'form') { currentMood = ''; resetForm(); }
  }
}

function ripple(el, e) {
  const rect = el.getBoundingClientRect();
  const cx = e ? e.clientX : rect.left + rect.width/2;
  const cy = e ? e.clientY : rect.top + rect.height/2;
  const size = Math.max(rect.width, rect.height) * 2.2;
  const r = document.createElement('div');
  r.className = 'ripple-ring';
  r.style.cssText = `width:${size}px;height:${size}px;left:${cx - size/2}px;top:${cy - size/2}px;`;
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function playHoleTransition(triggerEl, cb) {
  const canvas = document.getElementById('hole-canvas');
  const overlay = document.getElementById('hole-overlay');
  overlay.style.pointerEvents = 'all';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  let progress = 0;
  const duration = 520;
  const start = performance.now();

  function draw(now) {
    progress = Math.min((now - start) / duration, 1);
    const ease = progress < 0.5
      ? 2 * progress * progress
      : 1 - Math.pow(-2 * progress + 2, 2) / 2;

    ctx.clearRect(0, 0, W, H);

    // Dark fill that expands from centre
    const maxR = Math.hypot(W, H) * 0.6;
    const r = ease * maxR;

    // Background overlay
    ctx.fillStyle = `rgba(20,12,8,${ease * 0.92})`;
    ctx.fillRect(0, 0, W, H);

    // Punch hole (clear)
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * 0.55, r * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Soft glow ring around hole
    const grd = ctx.createRadialGradient(cx, cy, r * 0.35, cx, cy, r * 0.65);
    grd.addColorStop(0, 'rgba(255,235,200,0)');
    grd.addColorStop(0.5, `rgba(200,160,120,${ease * 0.18})`);
    grd.addColorStop(1, 'rgba(200,160,120,0)');
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * 0.65, r * 0.48, 0, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    if (progress < 1) {
      requestAnimationFrame(draw);
    } else {
      cb && cb();
      // Reverse: hole shrinks away
      const start2 = performance.now();
      function drawOut(now2) {
        const p2 = Math.min((now2 - start2) / 380, 1);
        const e2 = 1 - p2 * p2;
        ctx.clearRect(0, 0, W, H);
        const r2 = e2 * maxR;
        ctx.fillStyle = `rgba(20,12,8,${e2 * 0.92})`;
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.ellipse(cx, cy, r2 * 0.55, r2 * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        if (p2 < 1) requestAnimationFrame(drawOut);
        else {
          ctx.clearRect(0, 0, W, H);
          overlay.style.pointerEvents = 'none';
        }
      }
      requestAnimationFrame(drawOut);
    }
  }
  requestAnimationFrame(draw);
}

// ─── MOOD ───
function selectMood(mood) {
  currentMood = mood;
  document.getElementById('btn-joy').className = 'mood-btn' + (mood === 'joy' ? ' selected-joy' : '');
  document.getElementById('btn-sad').className = 'mood-btn' + (mood === 'sad' ? ' selected-sad' : '');
}

function updateCount() {
  const len = document.getElementById('content').value.length;
  document.getElementById('char-count').textContent = len;
}

function resetForm() {
  document.getElementById('content').value = '';
  document.getElementById('keyword').value = '';
  document.getElementById('ig-consent').checked = false;
  document.getElementById('char-count').textContent = '0';
  document.getElementById('btn-joy').className = 'mood-btn';
  document.getElementById('btn-sad').className = 'mood-btn';
}

// ─── SUBMIT ───
function submitForm() {
  const content = document.getElementById('content').value.trim();
  if (!currentMood) { showToast('請選擇你的心情 🌸'); return; }
  if (!content) { showToast('說幾個字吧，樹洞在聽'); return; }

  const entry = {
    id: Date.now(),
    mood: currentMood,
    content: content,
    keyword: document.getElementById('keyword').value.trim(),
    igConsent: document.getElementById('ig-consent').checked,
    time: new Date().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
    timestamp: Date.now()
  };

  allEntries = loadEntries();
  allEntries.unshift(entry);
  saveEntries(allEntries);

  // ── POST to Google Sheets ──
  fetch('https://script.google.com/macros/s/AKfycbw2VkQkt2ak4hWwqPMBuZrK6LBdgyOQvGTFa5eH8chNQrii87WDSxyHDi6LEJhuWdVd/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  }).catch(() => {}); // silent fail, data already in localStorage

  const moodSaved = currentMood;
  showView('success');
  setTimeout(() => launchMoodScene(moodSaved), 60);
}

];

// ── 不愉快 ── （日後可直接在這裡加入新物件）

  {

  }
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function resetSuccessView() {
  document.getElementById('env-scene').classList.remove('show');
  document.getElementById('joy-icon').classList.remove('show');
  document.getElementById('success-title').classList.remove('show');
  document.getElementById('success-subtitle').classList.remove('show');
  document.getElementById('success-cta').classList.remove('show');
  document.getElementById('env-flap').classList.remove('open');
  document.getElementById('env-letter').classList.remove('open');
  document.getElementById('env-scene').style.display = 'none';
  document.getElementById('joy-icon').style.display = 'none';
}

function launchMoodScene(mood) {
  resetSuccessView();
  const view = document.getElementById('view-success');
  view.className = 'view active mood-' + mood;

  const canvas = document.getElementById('success-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  if (mood === 'joy') {
    const letter = pick(JOY_LETTERS);
    document.getElementById('success-title').textContent = letter.title;
    document.getElementById('success-subtitle').innerHTML = letter.body.replace(/\n/g, '<br>');

    const icon = document.getElementById('joy-icon');
    icon.style.display = 'block';
    animateBloom(canvas);

    setTimeout(() => { icon.classList.add('show'); }, 80);
    setTimeout(() => { document.getElementById('success-title').classList.add('show'); }, 500);
    setTimeout(() => { document.getElementById('success-subtitle').classList.add('show'); }, 750);
    setTimeout(() => { document.getElementById('success-cta').classList.add('show'); }, 1000);

  } else {
    const letter = pick(SAD_LETTERS);
    document.getElementById('success-title').textContent = letter.title;
    document.getElementById('success-subtitle').innerHTML = letter.body.replace(/\n/g, '<br>');

    const scene = document.getElementById('env-scene');
    scene.style.display = 'block';
    animateDust(canvas);

    setTimeout(() => { scene.classList.add('show'); }, 100);
    setTimeout(() => { document.getElementById('env-flap').classList.add('open'); }, 700);
    setTimeout(() => { document.getElementById('env-letter').classList.add('open'); }, 1200);
    setTimeout(() => { document.getElementById('success-title').classList.add('show'); }, 1700);
    setTimeout(() => { document.getElementById('success-subtitle').classList.add('show'); }, 2000);
    setTimeout(() => { document.getElementById('success-cta').classList.add('show'); }, 2400);
  }
}

// ─── GARDEN BLOOM (joy) ───
function animateBloom(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // ── background garden flowers (small, already open) ──
  const bgFlowers = Array.from({length: 22}, () => ({
    x: Math.random() * W,
    y: H * 0.35 + Math.random() * H * 0.55,
    r: 4 + Math.random() * 9,
    petals: 4 + Math.floor(Math.random() * 3),
    color: ['#e8c4c0','#d4a5a0','#c4b5d0','#b5d4c0','#f0d8b0','#dcc8e0','#f5c8d0'][Math.floor(Math.random()*7)],
    sway: Math.random() * Math.PI * 2,
    swayV: 0.008 + Math.random() * 0.012,
    stemH: 18 + Math.random() * 28,
    alpha: 0,
    delay: Math.random() * 60
  }));

  // ── hero flower in centre ──
  const hero = { x: W * 0.5, y: H * 0.52, maxR: Math.min(W, H) * 0.13, progress: 0, sway: 0 };

  // ── floating petals ──
  const petals = Array.from({length: 18}, () => spawnPetal(W, H));
  function spawnPetal(W, H) {
    return {
      x: Math.random() * W, y: H + 20,
      size: 5 + Math.random() * 8,
      color: ['#e8c4c0','#d4a5a0','#dcc8e0','#f0d8b0'][Math.floor(Math.random()*4)],
      vx: (Math.random()-0.5)*1.0, vy: -(0.9+Math.random()*1.6),
      rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.05,
      life: 1, drift: Math.random()*Math.PI*2
    };
  }

  function drawPetalShape(ctx, r, petals, rot) {
    for (let i = 0; i < petals; i++) {
      const a = (i / petals) * Math.PI * 2 + rot;
      ctx.save();
      ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0, -r * 0.6, r * 0.38, r * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // centre
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,230,180,0.9)';
    ctx.fill();
  }

  let f = 0;
  (function draw() {
    ctx.clearRect(0, 0, W, H);

    // stems + bg flowers
    bgFlowers.forEach(fl => {
      if (f < fl.delay) return;
      fl.alpha = Math.min(fl.alpha + 0.025, 1);
      fl.sway += fl.swayV;
      const sway = Math.sin(fl.sway) * 3;
      ctx.save();
      ctx.globalAlpha = fl.alpha * 0.72;
      // stem
      ctx.beginPath();
      ctx.moveTo(fl.x, fl.y);
      ctx.lineTo(fl.x + sway, fl.y - fl.stemH);
      ctx.strokeStyle = '#8a9e7e';
      ctx.lineWidth = 1.2;
      ctx.stroke();
      // flower
      ctx.translate(fl.x + sway, fl.y - fl.stemH);
      ctx.fillStyle = fl.color;
      drawPetalShape(ctx, fl.r, fl.petals, fl.sway * 0.3);
      ctx.restore();
    });

    // hero flower blooms in
    if (f > 30) {
      hero.progress = Math.min(hero.progress + 0.018, 1);
      const ease = 1 - Math.pow(1 - hero.progress, 3);
      const r = hero.maxR * ease;
      hero.sway += 0.012;
      const sway = Math.sin(hero.sway) * 4;

      ctx.save();
      ctx.globalAlpha = ease;
      // stem
      ctx.beginPath();
      ctx.moveTo(hero.x, hero.y + r * 0.3);
      ctx.lineTo(hero.x + sway, hero.y - r * 0.5);
      ctx.strokeStyle = '#7a9068';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // petals open
      ctx.translate(hero.x + sway, hero.y - r * 0.5);
      const hue = ['#e8b4b8','#d498a0'];
      ctx.fillStyle = hue[0];
      // outer petals
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + hero.sway*0.15;
        ctx.save(); ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -r*0.62, r*0.32*ease, r*0.72*ease, 0, 0, Math.PI*2);
        ctx.fillStyle = hue[i%2]; ctx.fill();
        ctx.restore();
      }
      // inner petals
      ctx.fillStyle = '#f5d0d8';
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + Math.PI/6 + hero.sway*0.1;
        ctx.save(); ctx.rotate(a);
        ctx.beginPath();
        ctx.ellipse(0, -r*0.45, r*0.22*ease, r*0.5*ease, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      // centre glow
      const g = ctx.createRadialGradient(0,0,0,0,0,r*0.32);
      g.addColorStop(0,'rgba(255,235,150,1)');
      g.addColorStop(1,'rgba(255,200,100,0.6)');
      ctx.beginPath(); ctx.arc(0,0,r*0.32,0,Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
      ctx.restore();
    }

    // floating petals
    petals.forEach((p,i) => {
      p.x += p.vx + Math.sin(f*0.02+p.drift)*0.3;
      p.y += p.vy; p.rot += p.rotV; p.life -= 0.003;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life) * 0.65;
      ctx.beginPath();
      ctx.ellipse(0,0,p.size*0.4,p.size,0,0,Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
      ctx.restore();
      if (p.life <= 0 || p.y < -30) petals[i] = spawnPetal(W, H);
    });

    f++;
    requestAnimationFrame(draw);
  })();
}

// ─── DUST (sad) ── 溫柔光塵，從四周緩緩向中心聚攏
function animateDust(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const motes = Array.from({length: 20}, () => {
    const angle = Math.random() * Math.PI * 2;
    const dist = 120 + Math.random() * 180;
    return {
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      tx: cx + (Math.random() - 0.5) * 60,
      ty: cy + (Math.random() - 0.5) * 60,
      r: 1.5 + Math.random() * 2.5,
      alpha: 0, maxAlpha: 0.25 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.004 + Math.random() * 0.004
    };
  });
  let f = 0;
  (function draw() {
    ctx.clearRect(0, 0, W, H);
    motes.forEach(m => {
      m.phase += 0.025;
      m.x += (m.tx - m.x) * m.speed;
      m.y += (m.ty - m.y) * m.speed;
      m.alpha = Math.min(m.alpha + 0.008, m.maxAlpha * ((Math.sin(m.phase) + 1) * 0.5 + 0.4));
      const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 3.5);
      g.addColorStop(0, `rgba(210,185,165,${m.alpha})`);
      g.addColorStop(1, 'rgba(210,185,165,0)');
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(235,215,200,${m.alpha * 1.6})`; ctx.fill();
    });
    f++;
    if (f < 500) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, W, H);
  })();
}

let holdTimer = null;
function startAdminHold() {
  const ring = document.getElementById('hold-ring');
  ring.classList.remove('active');
  void ring.offsetWidth;
  ring.classList.add('active');
  holdTimer = setTimeout(() => { ring.classList.remove('active'); showAdmin(); }, 2000);
}

  clearTimeout(holdTimer);
  holdTimer = null;
  const ring = document.getElementById('hold-ring');
  ring.classList.remove('active');
}
