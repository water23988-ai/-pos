<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>拾逅樹洞 · 後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf6f0;--cream2:#f5ede0;--ivory:#fdf9f4;--dark:#2e1f14;--warm:#8b6e52;--muted:#8b7263;--sage:#8a9e7e;--blush:#c9928a;--border:rgba(139,110,82,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;-webkit-text-size-adjust:100%;}
.header{background:var(--dark);color:var(--cream);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:30px;filter:invert(1) brightness(2);opacity:0.85;pointer-events:none;}
.header-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:300;letter-spacing:1px;}
.header-count{font-size:11px;opacity:0.5;margin-top:1px;}
.refresh-btn{padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;}
.refresh-btn:hover{color:white;border-color:rgba(255,255,255,0.5);}
.stats-section{padding:14px 14px 0;}
.stats-title{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px;}
.stats-grid.two{grid-template-columns:repeat(2,1fr);}
.stat-box{background:var(--ivory);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
.stat-num{font-size:22px;font-weight:500;color:var(--dark);line-height:1;margin-bottom:3px;}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.3px;}
.stat-box.hl .stat-num{color:var(--blush);}
.stat-box.hl2 .stat-num{color:var(--sage);}
.conv-bar{background:var(--ivory);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.conv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.conv-label{font-size:12px;color:var(--muted);}
.conv-pct{font-size:22px;font-weight:500;color:var(--warm);}
.conv-track{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;}
.conv-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--blush));border-radius:4px;transition:width 0.8s ease;width:0%;}
.conv-detail{font-size:11px;color:var(--muted);margin-top:5px;text-align:right;opacity:0.7;}
.date-bar{padding:10px 14px;background:var(--cream2);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.date-bar label{font-size:12px;color:var(--muted);white-space:nowrap;}
.date-input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:white;color:var(--dark);outline:none;-webkit-appearance:none;}
.date-input:focus{border-color:rgba(139,110,82,0.5);}
.date-sep{font-size:12px;color:var(--muted);}
.date-clear{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.date-clear:hover{color:var(--warm);border-color:rgba(139,110,82,0.4);}
.date-result{font-size:11px;color:var(--muted);opacity:0.7;}
.filters{padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--ivory);position:sticky;top:57px;z-index:90;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;white-space:nowrap;}
.filter-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.filter-btn:hover:not(.active){border-color:rgba(139,110,82,0.4);color:var(--warm);}
.list{padding:10px 14px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--ivory);border:1px solid var(--border);border-radius:14px;padding:14px;transition:box-shadow 0.2s;}
.card:hover{box-shadow:0 2px 14px rgba(61,43,31,0.08);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
.mood-tag{font-size:12px;padding:3px 11px;border-radius:20px;font-weight:500;white-space:nowrap;}
.tag-joy{background:rgba(138,158,126,0.15);color:#4a6b3e;}
.tag-sad{background:rgba(212,165,160,0.2);color:#7a4040;}
.card-datetime{font-size:11px;color:var(--muted);opacity:0.65;flex-shrink:0;text-align:right;line-height:1.6;}
.card-content{font-size:14px;line-height:1.85;color:var(--dark);margin-bottom:10px;white-space:pre-wrap;}
.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ig-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(188,24,136,0.1);color:#bc1888;font-weight:500;}
.tracked-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(138,158,126,0.15);color:#4a6b3e;font-weight:500;}
.no-badge{font-size:11px;color:var(--muted);opacity:0.4;}
.action-btns{display:flex;gap:6px;flex-wrap:wrap;}
.act-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;white-space:nowrap;}
.act-btn:active{transform:scale(0.96);}
.act-btn.ig:hover{background:#e1306c;border-color:#e1306c;color:white;}
.act-btn.th:hover{background:#1a1a1a;border-color:#1a1a1a;color:white;}
.empty{text-align:center;padding:56px 20px;color:var(--muted);font-size:14px;line-height:2;}
.loading-state{text-align:center;padding:56px 20px;color:var(--muted);font-size:13px;}
.error-bar{background:#fff0f0;border-bottom:1px solid rgba(180,60,60,0.15);padding:12px 16px;font-size:13px;color:#7a3030;line-height:1.7;display:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--dark);color:var(--cream);padding:9px 22px;border-radius:22px;font-size:13px;transition:transform 0.3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
const SHEET_ID = '1ufC2XtGF3xA3b8ftTNVz7yi6Y7vimya9ubxtNCzbDNY';
let all = [], moodFilter = 'all', dateFrom = '', dateTo = '';

async function loadData() {
  document.getElementById('list').innerHTML = '<div class="loading-state">讀取中⋯</div>';
  document.getElementById('hcount').textContent = '讀取中⋯';
  document.getElementById('err').style.display = 'none';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=樹洞心情&t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('無法讀取試算表，請確認已設為公開檢視');
    const text = await res.text();
    const rows = parseCSV(text);
    all = rows.length > 1
      ? rows.slice(1).map((r,i) => ({
          id:i, date:r[0]||'', time:r[1]||'',
          mood:r[2]||'', keyword:r[3]||'', content:r[4]||'',
          igConsent:r[5]==='✓ 同意', tracked:r[6]==='✓ 已點擊'
        })).filter(e=>e.content).reverse()
      : [];
    document.getElementById('hcount').textContent = all.length + ' 則心情';
    applyFilter();
  } catch(e) {
    showErr('⚠️ ' + e.message);
    document.getElementById('hcount').textContent = '讀取失敗';
    document.getElementById('list').innerHTML = '';
  }
}

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const cols=[]; let cur='', inQ=false;
    for (const c of line) {
      if (c==='"') inQ=!inQ;
      else if (c===',' && !inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim()); return cols;
  });
}

function getFiltered() {
  let e = all;
  if (dateFrom) e = e.filter(x => x.date >= dateFrom.replace(/-/g,'/'));
  if (dateTo)   e = e.filter(x => x.date <= dateTo.replace(/-/g,'/'));
  if (moodFilter==='joy')     e = e.filter(x=>x.mood.includes('開心'));
  if (moodFilter==='sad')     e = e.filter(x=>x.mood.includes('不愉快'));
  if (moodFilter==='ig')      e = e.filter(x=>x.igConsent);
  if (moodFilter==='tracked') e = e.filter(x=>x.tracked);
  return e;
}

function updateStats(entries) {
  const t = entries.length;
  const tracked = entries.filter(e=>e.tracked).length;
  const pct = t > 0 ? Math.round(tracked/t*100) : 0;
  document.getElementById('s-total').textContent = t;
  document.getElementById('s-joy').textContent = entries.filter(e=>e.mood.includes('開心')).length;
  document.getElementById('s-sad').textContent = entries.filter(e=>e.mood.includes('不愉快')).length;
  document.getElementById('s-ig').textContent = entries.filter(e=>e.igConsent).length;
  document.getElementById('s-tracked').textContent = tracked;
  document.getElementById('s-kw').textContent = entries.filter(e=>e.keyword).length;
  document.getElementById('conv-fill').style.width = pct + '%';
  document.getElementById('conv-pct').textContent = pct + '%';
  document.getElementById('conv-detail').textContent = `已點擊追蹤 ${tracked} 人　共 ${t} 則投遞`;
}

function applyFilter() {
  dateFrom = document.getElementById('date-from').value;
  dateTo   = document.getElementById('date-to').value;
  const filtered = getFiltered();
  const hasDate = dateFrom || dateTo;
  document.getElementById('date-result').textContent = hasDate ? `共 ${filtered.length} 則` : '';
  updateStats(filtered);
  render(filtered);
}

function clearDate() {
  dateFrom=''; dateTo='';
  document.getElementById('date-from').value='';
  document.getElementById('date-to').value='';
  document.getElementById('date-result').textContent='';
  applyFilter();
}

function setFilter(f,btn) {
  moodFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function render(entries) {
  const list = document.getElementById('list');
  if (!entries.length) {
    list.innerHTML='<div class="empty">這個條件沒有資料<br>試試調整篩選範圍 🌸</div>'; return;
  }
  list.innerHTML = entries.map(e=>`
    <div class="card">
      <div class="card-top">
        <span class="mood-tag ${e.mood.includes('開心')?'tag-joy':'tag-sad'}">
          ${e.mood}${e.keyword?' · '+e.keyword:''}
        </span>
        <div class="card-datetime">${e.date}<br>${e.time}</div>
      </div>
      <div class="card-content">${esc(e.content)}</div>
      <div class="card-footer">
        <div class="badge-row">
          ${e.igConsent?'<span class="ig-badge">✓ 同意分享</span>':'<span class="no-badge">未授權</span>'}
          ${e.tracked?'<span class="tracked-badge">✓ 已追蹤</span>':''}
        </div>
        <div class="action-btns">
          <button class="act-btn ig" onclick="copyIG(${e.id})">複製 IG</button>
          <button class="act-btn th" onclick="copyThreads(${e.id})">複製 Threads</button>
        </div>
      </div>
    </div>`).join('');
}

function copyIG(id) {
  const e=all.find(x=>x.id===id); if(!e) return;
  const emoji=e.mood.includes('開心')?'🌸':'🍂';
  copy(`${emoji} 有人說——\n\n「${e.content}」\n\n${e.keyword?'#'+e.keyword+' ':''}#拾逅樹洞 #FOCUS13 #momentflor #拾逅花事\n\n你有過這樣的感覺嗎？`,'IG 發文已複製 ✓');
}
function copyThreads(id) {
  const e=all.find(x=>x.id===id); if(!e) return;
  const emoji=e.mood.includes('開心')?'🌸':'🍂';
  copy(`${emoji} 樹洞裡，有人這樣說——\n\n${e.content}\n\n${e.keyword?'#'+e.keyword+' ':''}#拾逅樹洞 #momentflor`,'Threads 發文已複製 ✓');
}
function copy(text,msg){ navigator.clipboard.writeText(text).then(()=>showToast(msg)); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showErr(msg){ const el=document.getElementById('err'); el.textContent=msg; el.style.display='block'; }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
loadData();
</script>
</body>
</html>
