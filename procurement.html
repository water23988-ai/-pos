<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 進貨管理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { font-family: 'Noto Sans TC', -apple-system, sans-serif; box-sizing: border-box; }
        body { background: #F0E9DF; color: #3D2E1E; overflow-x: hidden; -webkit-font-smoothing: antialiased; margin: 0; }

        /* ── 側邊欄 ── */
        .side-nav { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #E5D2B8; border-right: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; z-index: 200; box-shadow: 2px 0 12px rgba(0,0,0,0.06); }
        .nav-brand { padding: 22px 18px 18px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; gap: 10px; }
        .nav-brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #8e9775, #6d7756); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-brand-name { font-size: 14px; font-weight: 800; color: #3d2e1e; }
        .nav-brand-sub { font-size: 10px; color: #a08060; margin-top: 2px; }
        .nav-section-label { font-size: 9px; font-weight: 700; color: #b8976a; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 18px 6px; }
        .nav-items { flex: 1; padding: 10px 8px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #7a5c3a; font-size: 13px; font-weight: 500; text-decoration: none; border-radius: 10px; margin-bottom: 2px; transition: all 0.15s; }
        .nav-item:hover { background: rgba(0,0,0,0.05); color: #3d2e1e; }
        .nav-item.active { background: rgba(109,119,86,0.15); color: #4d3520; font-weight: 700; }
        .nav-icon { font-size: 17px; flex-shrink: 0; }
        .nav-bottom { padding: 12px 8px 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .gas-status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; background: rgba(0,0,0,0.06); font-size: 11px; color: #a08060; }
        .gas-status-bar button { background: rgba(0,0,0,0.06); border: none; border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; margin-left: auto; }

        /* ── 主內容 ── */
        .main-area { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
        .main-header { background: #FAF7F2; border-bottom: 1px solid #DDD0BC; padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .main-header-title { font-size: 16px; font-weight: 800; color: #3D2E1E; }
        .main-header-store { font-size: 12px; color: #7A6550; background: #F5EFE6; border: 1px solid #DDD0BC; border-radius: 20px; padding: 5px 14px; font-weight: 600; }
        .main-content { padding: 20px 20px 100px; }

        /* ── 據點 chips ── */
        .store-chips { background: #FAF7F2; border-bottom: 1px solid #DDD0BC; padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .store-chip-label { font-size: 10px; font-weight: 700; color: #A89278; letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; }

        /* ── 雙欄佈局 ── */
        .two-col { display: grid; grid-template-columns: 1fr 400px; gap: 20px; align-items: start; }

        /* ── 通用卡片 ── */
        .card { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; padding: 20px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); margin-bottom: 16px; }
        .card-title { font-size: 11px; font-weight: 700; color: #A89278; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }

        /* ── 表單 ── */
        .f-input { width: 100%; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 10px 13px; font-size: 14px; outline: none; background: #F5EFE6; color: #3D2E1E; transition: all 0.15s; }
        .f-input:focus { border-color: #8e9775; background: #FAF7F2; box-shadow: 0 0 0 3px rgba(142,151,117,0.1); }
        .f-select { width: 100%; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 10px 13px; font-size: 14px; outline: none; background: #F5EFE6; color: #3D2E1E; }
        .f-label { font-size: 11px; font-weight: 600; color: #A89278; letter-spacing: 0.04em; text-transform: uppercase; display: block; margin-bottom: 6px; }

        /* ── 按鈕 ── */
        .btn-primary { background: #8e9775; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #C8B89A; cursor: not-allowed; }
        .btn-secondary { background: #F5EFE6; color: #7A6550; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-secondary:hover { background: #EDE5D8; }

        /* ── Chips ── */
        .chip { border: 1.5px solid #DDD0BC; background: #FAF7F2; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: #7A6550; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .chip.active { border-color: #8e9775; background: #f0f3ec; color: #4d6145; font-weight: 700; }

        /* ── GAS dot ── */
        .gas-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; background: #C8B89A; flex-shrink: 0; }
        .gas-dot.ok { background: #8E9775; }
        .gas-dot.loading { background: #C4A87A; animation: blink 0.8s infinite; }
        .gas-dot.error { background: #C4928A; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Toast ── */
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #7A6550; color: white; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── 花材輸入行（新設計）── */
        .item-row { background: #F5EFE6; border: 1px solid #DDD0BC; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
        .item-row-top { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; margin-bottom: 10px; }
        .item-row-nums { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; align-items: end; }
        .item-row-calc { background: rgba(109,119,86,0.08); border-radius: 8px; padding: 7px 10px; margin-top: 8px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .calc-chip { font-size: 11px; color: #6d7756; white-space: nowrap; }
        .calc-chip strong { font-weight: 700; }
        .item-del-btn { background: none; border: none; color: #C4928A; font-size: 22px; cursor: pointer; line-height: 1; padding: 0 2px; flex-shrink: 0; }
        .item-num-badge { background: #8e9775; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
        .f-input-sm { width: 100%; border: 1.5px solid #DDD0BC; border-radius: 9px; padding: 8px 10px; font-size: 13px; outline: none; background: #FAF7F2; color: #3D2E1E; transition: all 0.15s; -webkit-appearance: none; }
        .f-input-sm:focus { border-color: #8e9775; box-shadow: 0 0 0 3px rgba(142,151,117,0.1); }
        .f-label-xs { font-size: 10px; font-weight: 600; color: #A89278; letter-spacing: 0.04em; display: block; margin-bottom: 5px; }
        .f-select-sm { width: 100%; border: 1.5px solid #DDD0BC; border-radius: 9px; padding: 7px 10px; font-size: 13px; outline: none; background: #FAF7F2; color: #3D2E1E; }

        /* ── 合計 bar ── */
        .total-bar { background: #f0f3ec; border: 1.5px solid #8e9775; border-radius: 14px; padding: 14px 18px; margin-top: 4px; }

        /* ── 空提示 ── */
        .empty-hint { text-align: center; color: #A89278; font-size: 13px; padding: 32px 0; }

        /* ── 進貨紀錄 ── */
        .batch-row { background: #FAF7F2; border: 1px solid #DDD0BC; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
        .batch-row:hover { border-color: #C4A87A; }
        .batch-row.expanded { border-color: #8e9775; }
        .item-detail-row { font-size: 12px; padding: 7px 0; border-bottom: 1px solid #EDE5D8; display: flex; justify-content: space-between; align-items: center; }
        .item-detail-row:last-child { border-bottom: none; }

        /* ── 固定底部 bar ── */
        .checkout-bar { position: fixed; left: 220px; right: 0; bottom: 0; background: #7A6550; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 100; box-shadow: 0 -2px 12px rgba(61,46,30,0.15); }
        .checkout-bar-info { color: rgba(255,255,255,0.7); font-size: 13px; }
        .checkout-bar-total { color: white; font-size: 18px; font-weight: 800; }
        .checkout-bar-btn { background: white; color: #7A6550; border: none; border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 800; cursor: pointer; transition: opacity 0.15s; }
        .checkout-bar-btn:hover { opacity: 0.9; }
        .checkout-bar-btn:disabled { background: rgba(255,255,255,0.4); cursor: not-allowed; color: rgba(255,255,255,0.7); }

        /* ── API / Edit Modal ── */
        .api-modal { display: none; position: fixed; inset: 0; background: rgba(61,46,30,0.45); backdrop-filter: blur(6px); z-index: 400; align-items: center; justify-content: center; }
        .api-modal.show { display: flex; }
        .api-modal-box { background: #FAF7F2; border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; margin: 16px; border: 1px solid #DDD0BC; }

        /* ── 右欄固定 ── */
        .right-col-sticky { position: sticky; top: 78px; }

        /* ════════════════════════════════
           手機響應式設計 (≤768px)
        ════════════════════════════════ */
        /* ── 手機底部導航 ── */
        .mobile-bottom-nav { display: none; }

        @media (max-width: 768px) {
            .side-nav { display: none !important; }
            .main-area { margin-left: 0 !important; }
            .main-header { padding: 0 16px; }
            .main-content { padding: 16px 14px 160px; }
            .store-chips { padding: 10px 14px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }

            /* 雙欄變單欄 */
            .two-col { grid-template-columns: 1fr !important; gap: 0; }
            .right-col-sticky { position: static; }

            /* checkout bar 在手機底部導航上方 */
            .checkout-bar { left: 0 !important; bottom: 60px; }

            /* 手機底部導航 */
            .mobile-bottom-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 60px;
                background: #FAF7F2;
                border-top: 1.5px solid #DDD0BC;
                z-index: 150;
                padding-bottom: env(safe-area-inset-bottom, 0px);
                box-shadow: 0 -2px 8px rgba(61,46,30,0.08);
            }
            .mbn-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                color: #A89278;
                font-size: 9px;
                font-weight: 600;
                padding: 6px 2px 4px;
                -webkit-tap-highlight-color: transparent;
                gap: 2px;
            }
            .mbn-item.active { color: #6d7756; }
            .mbn-icon { font-size: 20px; line-height: 1; }

            /* item-row 在手機上微調 */
            .item-row-nums { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        }
    </style>
</head>
<body>
<!-- ══ 密碼鎖 ══ -->
<div id="pwLock" style="position:fixed;inset:0;background:#F0E9DF;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC',-apple-system,sans-serif;">
  <div id="pwBox" style="text-align:center;padding:32px 28px;background:#FAF7F2;border-radius:24px;border:1px solid #DDD0BC;width:280px;box-shadow:0 4px 24px rgba(122,101,80,0.12);">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#8e9775,#6d7756);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;">🌸</div>
    <div style="font-size:15px;font-weight:800;color:#3D2E1E;margin-bottom:4px;">拾逅花事</div>
    <div style="font-size:11px;color:#A89278;margin-bottom:20px;">請輸入管理密碼</div>
    <input id="pwInput" type="password" inputmode="numeric" maxlength="10" placeholder="••••"
      style="width:100%;border:1.5px solid #DDD0BC;border-radius:12px;padding:12px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;background:#F5EFE6;color:#3D2E1E;margin-bottom:10px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter')_checkPw()">
    <div id="pwErr" style="font-size:11px;color:#C4928A;min-height:16px;margin-bottom:10px;"></div>
    <button onclick="_checkPw()" style="width:100%;background:#8e9775;color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;">進入</button>
  </div>
</div>
<style>@keyframes pwShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}</style>
<script>
(function(){const PW='8282',KEY='mf_auth';if(sessionStorage.getItem(KEY)==='ok'){document.getElementById('pwLock').style.display='none';}else{setTimeout(()=>document.getElementById('pwInput').focus(),150);}window._checkPw=function(){var v=document.getElementById('pwInput').value;if(v===PW){sessionStorage.setItem(KEY,'ok');document.getElementById('pwLock').style.display='none';}else{document.getElementById('pwErr').innerText='密碼錯誤';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();var b=document.getElementById('pwBox');b.style.animation='none';b.offsetHeight;b.style.animation='pwShake 0.4s ease';}}})();
</script>
<div id="toast"></div>

<!-- 進貨紀錄編輯 Modal -->
<div class="api-modal" id="editBatchModal" style="display:none;">
    <div class="api-modal-box" style="max-width:480px;max-height:88vh;overflow-y:auto;" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">✏️ 編輯進貨紀錄</h3>
            <button onclick="closeEditBatch()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <div style="background:#F5EFE6;border-radius:12px;padding:14px;margin-bottom:14px;">
            <p style="font-size:10px;font-weight:700;color:#A89278;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;">批次資訊</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
                <div>
                    <label class="f-label">供應商</label>
                    <input type="text" id="edit-source" class="f-input" placeholder="供應商名稱">
                </div>
                <div>
                    <label class="f-label">進貨日期</label>
                    <input type="date" id="edit-date" class="f-input">
                </div>
            </div>
            <div>
                <label class="f-label">備註</label>
                <input type="text" id="edit-note" class="f-input" placeholder="選填">
            </div>
        </div>
        <p style="font-size:10px;font-weight:700;color:#A89278;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">品項明細</p>
        <div id="editItemsList" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:10px;">
            <button onclick="saveEditBatch()" class="btn-primary" style="flex:1;">儲存修改</button>
            <button onclick="closeEditBatch()" class="btn-secondary" style="flex:0 0 auto;padding:10px 20px;">取消</button>
        </div>
    </div>
</div>

<!-- API Modal -->
<div class="api-modal" id="apiModal">
    <div class="api-modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">⚙️ 連線設定</h3>
            <button onclick="closeApiModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <label class="f-label">API URL</label>
        <input type="text" id="apiInput" class="f-input" style="margin-bottom:14px;" placeholder="貼上 GAS 部署網址">
        <button onclick="saveApi()" class="btn-primary" style="width:100%;">儲存並連線</button>
    </div>
</div>

<!-- 側邊欄 -->

        <div class="nav-brand-icon">🌸</div>

        <a href="procurement.html" class="nav-item active"><span class="nav-icon">🚚</span>進貨管理</a>

        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>後台報表</a>

<!-- 主區域 -->
<div class="main-area">
    <div class="main-header">
        <div class="main-header-title">🚚 進貨管理</div>
        <div class="main-header-store" id="storeLabel">請選擇據點</div>
    </div>

    <div class="store-chips">
        <span class="store-chip-label">據點</span>
        <button onclick="setStore('高雄FOCUS 13')" id="btn-kh" class="chip">高雄 FOCUS</button>
        <button onclick="setStore('台南FOCUS')"    id="btn-tn" class="chip">台南 FOCUS</button>
        <button onclick="setStore('誠品生活台南')" id="btn-es" class="chip">誠品台南</button>
    </div>

    <div class="main-content">
        <div class="two-col">

            <!-- 左欄：進貨表單 -->
            <div>
                <!-- 供應商 -->
                <div class="card">
                    <div class="card-title">供應商</div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;" id="srcBtns">
                        <button class="chip active" onclick="setSrc(this,'高雄深綠')">高雄深綠</button>
                        <button class="chip" onclick="setSrc(this,'台南花市')">台南花市</button>
                        <button class="chip" onclick="setSrc(this,'台北花誠')">台北花誠</button>
                        <button class="chip" onclick="setSrc(this,'自訂')">自訂…</button>
                    </div>
                    <input id="srcCustom" type="text" placeholder="輸入供應商名稱" class="f-input" style="margin-top:12px;display:none;" oninput="selectedSource=this.value">
                </div>

                <!-- 日期 + 備註 -->
                <div class="card">
                    <div class="card-title">進貨資訊</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                        <div>
                            <label class="f-label">進貨日期</label>
                            <input id="procDate" type="date" class="f-input">
                        </div>
                        <div>
                            <label class="f-label">備註</label>
                            <input id="procNote" type="text" placeholder="選填" class="f-input">
                        </div>
                    </div>
                </div>

                <!-- ═══ 花材清單（新設計）═══ -->
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                        <div class="card-title" style="margin-bottom:0;">花材清單</div>
                        <button onclick="addItemRow()" class="btn-secondary" style="font-size:13px;padding:8px 16px;display:flex;align-items:center;gap:6px;">
                            <span style="font-size:16px;line-height:1;">＋</span> 新增品項
                        </button>
                    </div>

                    <!-- 提示文字（有品項時隱藏） -->
                    <p id="emptyHint" class="empty-hint">點「新增品項」開始輸入進貨花材</p>

                    <!-- 品項列表 -->
                    <div id="itemList"></div>

                    <!-- 合計（有品項時顯示） -->
                    <div id="totalBar" class="total-bar" style="display:none;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-size:13px;color:#7A6550;font-weight:600;">本批總花費</span>
                            <span id="totalCostDisplay" style="font-size:20px;font-weight:800;color:#6d7756;">NT$ 0</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                            <span style="font-size:11px;color:#A89278;">品項種類</span>
                            <span id="totalItemsDisplay" style="font-size:11px;color:#7A6550;">0 種</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右欄：進貨紀錄 -->
            <div class="right-col-sticky">
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                        <div class="card-title" style="margin-bottom:0;">進貨紀錄</div>
                        <button onclick="loadBatches()" class="btn-secondary" style="font-size:12px;padding:6px 14px;">重新載入</button>
                    </div>
                    <div id="batchList"><p class="empty-hint" style="padding:24px 0;">載入中...</p></div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- 固定底部送出 bar -->
<div class="checkout-bar">
    <div>
        <div class="checkout-bar-info" id="barItemCount">尚未新增品項</div>
        <div class="checkout-bar-total" id="barTotal">NT$ 0</div>
    </div>
    <button id="submitBtn" onclick="submitProcurement()" class="checkout-bar-btn">送出進貨</button>
</div>

<!-- 手機底部導航 -->
<nav class="mobile-bottom-nav">
    <a href="index.html" class="mbn-item"><span class="mbn-icon">🛒</span><span>收銀台</span></a>
    <a href="sales.html" class="mbn-item"><span class="mbn-icon">🔍</span><span>銷售</span></a>
    <a href="procurement.html" class="mbn-item active"><span class="mbn-icon">🚚</span><span>進貨</span></a>
    <a href="products.html" class="mbn-item"><span class="mbn-icon">🌹</span><span>商品</span></a>

</nav>

<span id="statusInfo" style="display:none;"></span>

<script>
// ══ 設定 ══
let API_URL      = localStorage.getItem('moment_flor_api') || '';
let currentStore = '';
let selectedSource = '高雄深綠';
let flowerLibrary  = [];
let procItems      = [];   // [{ flowerName, category, stemsPerBunch, bunchesQty, pricePerBunch }]
let _expandedBatch = null;
let _batchData     = [];

// ══ API Modal ══
function openApiModal() {
    document.getElementById('apiInput').value = API_URL;
    document.getElementById('apiModal').classList.add('show');
}
function closeApiModal() {
    document.getElementById('apiModal').classList.remove('show');
}
document.getElementById('apiModal').addEventListener('click', function(e) {
    if (e.target === this) closeApiModal();
});

// ══ GAS 狀態 ══
function setGas(state) {
    const dot   = document.getElementById('gasDot');
    const label = document.getElementById('gasLabel');
    const info  = document.getElementById('statusInfo');
    dot.className = 'gas-dot ' + state;
    if (state === 'loading') { label.innerText = '同步中'; if(info) info.innerText = '同步中...'; }
    if (state === 'ok')      { label.innerText = '正常';   if(info) info.innerText = '✅ 連線正常'; }
    if (state === 'error')   { label.innerText = '錯誤';   if(info) info.innerText = '❌ API 連線錯誤'; }
}

function saveApi() {
    const v = document.getElementById('apiInput').value.trim();
    if (!v) return;
    localStorage.setItem('moment_flor_api', v);
    API_URL = v;
    closeApiModal();
    init();
}

// ══ 據點 ══
function setStore(s) {
    currentStore = s;
    ['kh','tn','es'].forEach(k => document.getElementById('btn-'+k).classList.remove('active'));
    const map = { '高雄FOCUS 13':'btn-kh', '台南FOCUS':'btn-tn', '誠品生活台南':'btn-es' };
    if (map[s]) document.getElementById(map[s]).classList.add('active');
    document.getElementById('storeLabel').innerText = s;
}

// ══ 供應商 ══
function setSrc(btn, src) {
    document.querySelectorAll('#srcBtns .chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const customInput = document.getElementById('srcCustom');
    if (src === '自訂') {
        customInput.style.display = '';
        selectedSource = customInput.value || '';
        customInput.focus();
    } else {
        customInput.style.display = 'none';
        selectedSource = src;
    }
}

// ══ 花材庫 ══
async function loadFlowerLibrary() {
    if (!API_URL) return;
    try {
        const res = await fetch(`${API_URL}?action=getFlowerLibrary`);
        flowerLibrary = await res.json();
    } catch(e) {}
}

function flowerSuggestions() {
    return flowerLibrary.map(f => f.name);
}

// ══ 花材清單 CRUD（新設計）══
function addItemRow() {
    procItems.push({ flowerName:'', category:'主花', stemsPerBunch:10, bunchesQty:0, pricePerBunch:0 });
    document.getElementById('emptyHint').style.display = 'none';
    renderItemList();
    // 自動捲到新品項並 focus
    setTimeout(() => {
        const inputs = document.querySelectorAll('.item-name-input');
        if (inputs.length) inputs[inputs.length - 1].focus();
        const rows = document.querySelectorAll('.item-row');
        if (rows.length) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 80);
}

function removeItemRow(idx) {
    procItems.splice(idx, 1);
    if (procItems.length === 0) document.getElementById('emptyHint').style.display = '';
    renderItemList();
    updateTotal();
}

function onFieldChange(idx, field, val) {
    procItems[idx][field] = (field === 'flowerName' || field === 'category') ? val : (Number(val) || 0);
    updateCalcDisplay(idx);
    updateTotal();
}

function updateCalcDisplay(idx) {
    const item = procItems[idx];
    const spb  = Number(item.stemsPerBunch) || 0;
    const bq   = Number(item.bunchesQty)    || 0;
    const ppb  = Number(item.pricePerBunch) || 0;
    const totalStems     = spb * bq;
    const costPerStem    = spb > 0 ? Math.round(ppb / spb * 100) / 100 : 0;
    const suggestedPrice = Math.round(costPerStem * 3.8);
    const itemCost       = ppb * bq;

    const el = document.getElementById(`calc-${idx}`);
    if (el) {
        el.innerHTML = `
            <span class="calc-chip">總枝數 <strong>${totalStems}</strong></span>
            <span style="color:#DDD0BC;">·</span>
            <span class="calc-chip">枝成本 <strong>NT$${costPerStem.toFixed(1)}</strong></span>
            <span style="color:#DDD0BC;">·</span>
            <span class="calc-chip">建議售價 <strong>NT$${suggestedPrice}</strong></span>
            <span style="color:#DDD0BC;">·</span>
            <span class="calc-chip" style="color:#8e9775;font-weight:700;">小計 NT$${itemCost.toLocaleString()}</span>
        `;
    }
}

function updateTotal() {
    const total = procItems.reduce((s, item) => {
        return s + (Number(item.pricePerBunch)||0) * (Number(item.bunchesQty)||0);
    }, 0);
    const bar = document.getElementById('totalBar');
    if (procItems.length > 0) {
        bar.style.display = '';
        document.getElementById('totalCostDisplay').innerText = 'NT$ ' + total.toLocaleString();
        document.getElementById('totalItemsDisplay').innerText = procItems.length + ' 種';
    } else {
        bar.style.display = 'none';
    }
    document.getElementById('barItemCount').innerText = procItems.length > 0 ? `${procItems.length} 種花材` : '尚未新增品項';
    document.getElementById('barTotal').innerText = 'NT$ ' + total.toLocaleString();
}

function renderItemList() {
    const el = document.getElementById('itemList');
    const suggList = flowerSuggestions();
    // Datalist for autocomplete
    const datalistHtml = suggList.length
        ? `<datalist id="flowerSuggList">${suggList.map(n => `<option value="${n}">`).join('')}</datalist>`
        : '';

    const addMoreBtn = procItems.length > 0
        ? `<div style="padding-top:4px;"><button onclick="addItemRow()" class="btn-secondary" style="width:100%;font-size:13px;padding:10px 16px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;"><span style="font-size:16px;line-height:1;">＋</span>繼續新增品項</button></div>`
        : '';

    el.innerHTML = datalistHtml + procItems.map((item, idx) => `
    <div class="item-row" id="irow-${idx}">
        <!-- 第一行：品名 + 分類 + 刪除 -->
        <div class="item-row-top">
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="item-num-badge">${idx + 1}</span>
                <input type="text"
                    class="f-input-sm item-name-input"
                    placeholder="花材名稱"
                    list="${suggList.length ? 'flowerSuggList' : ''}"
                    value="${escHtml(item.flowerName)}"
                    oninput="onFieldChange(${idx},'flowerName',this.value)"
                    style="flex:1;">
            </div>
            <select class="f-select-sm" style="width:72px;" onchange="onFieldChange(${idx},'category',this.value)">
                <option value="主花" ${item.category==='主花'?'selected':''}>主花</option>
                <option value="配花" ${item.category==='配花'?'selected':''}>配花</option>
                <option value="葉材" ${item.category==='葉材'?'selected':''}>葉材</option>
                <option value="其他" ${item.category==='其他'?'selected':''}>其他</option>
            </select>
            <button class="item-del-btn" onclick="removeItemRow(${idx})">×</button>
        </div>

        <!-- 第二行：三個數字 -->
        <div class="item-row-nums">
            <div>
                <label class="f-label-xs">枝/把</label>
                <input type="number" min="1" inputmode="numeric" placeholder="10" class="f-input-sm"
                    value="${item.stemsPerBunch || ''}"
                    oninput="onFieldChange(${idx},'stemsPerBunch',this.value)">
            </div>
            <div>
                <label class="f-label-xs">購入把數</label>
                <input type="number" min="1" inputmode="numeric" placeholder="把" class="f-input-sm"
                    value="${item.bunchesQty || ''}"
                    oninput="onFieldChange(${idx},'bunchesQty',this.value)">
            </div>
            <div>
                <label class="f-label-xs">每把單價</label>
                <input type="number" min="0" inputmode="numeric" placeholder="NT$" class="f-input-sm"
                    value="${item.pricePerBunch || ''}"
                    oninput="onFieldChange(${idx},'pricePerBunch',this.value)">
            </div>
        </div>

        <!-- 第三行：自動計算結果 -->
        <div class="item-row-calc" id="calc-${idx}">
            <span class="calc-chip" style="color:#A89278;">輸入數量與單價後自動計算</span>
        </div>
    </div>`).join('') + addMoreBtn;

    // 重新計算所有
    procItems.forEach((_, i) => updateCalcDisplay(i));
    updateTotal();
}

function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══ 送出進貨 ══
async function submitProcurement() {
    if (!API_URL) return alert('請先設定 API 網址');
    if (!currentStore) return alert('請先選擇進貨據點');
    if (!selectedSource) return alert('請選擇供應商');
    if (procItems.length === 0) return alert('請至少新增一項花材');

    for (let i = 0; i < procItems.length; i++) {
        const it = procItems[i];
        if (!it.flowerName)                return alert(`品項 ${i+1}：請輸入花材名稱`);
        if (!it.stemsPerBunch || it.stemsPerBunch <= 0) return alert(`品項 ${i+1}「${it.flowerName}」：請輸入枝/把`);
        if (!it.bunchesQty   || it.bunchesQty   <= 0)  return alert(`品項 ${i+1}「${it.flowerName}」：請輸入購入把數`);
        if (!it.pricePerBunch|| it.pricePerBunch <= 0)  return alert(`品項 ${i+1}「${it.flowerName}」：請輸入每把單價`);
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = '送出中...';
    setGas('loading');

    try {
        const payload = {
            action: 'addProcurement',
            data: {
                source: selectedSource,
                store : currentStore,
                date  : document.getElementById('procDate').value || '',
                note  : document.getElementById('procNote').value.trim(),
                items : procItems.map(it => ({
                    flowerName   : it.flowerName,
                    category     : it.category,
                    stemsPerBunch: Number(it.stemsPerBunch),
                    bunchesQty   : Number(it.bunchesQty),
                    pricePerBunch: Number(it.pricePerBunch),
                })),
            }
        };
        const res    = await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.success) {
            setGas('ok');
            showToast(`✅ 進貨完成！${result.totalItems || procItems.length} 種 · NT$ ${(result.totalCost||0).toLocaleString()}`);
            procItems = [];
            document.getElementById('itemList').innerHTML = '';
            document.getElementById('emptyHint').style.display = '';
            document.getElementById('procNote').value = '';
            document.getElementById('totalBar').style.display = 'none';
            updateTotal();
            loadBatches();
        } else {
            setGas('error');
            alert('送出失敗：' + (result.error || '未知錯誤'));
        }
    } catch(e) {
        setGas('error');
        alert('連線失敗，請確認 API 網址');
    }
    btn.disabled = false; btn.innerText = '送出進貨';
}

// ══ 進貨紀錄 ══
async function loadBatches() {
    if (!API_URL) return;
    const el = document.getElementById('batchList');
    el.innerHTML = '<p class="empty-hint" style="padding:24px 0;">載入中...</p>';
    setGas('loading');
    try {
        const res = await fetch(`${API_URL}?action=getProcurementBatches`);
        _batchData = await res.json();
        setGas('ok');
        renderBatches();
    } catch(e) {
        setGas('error');
        el.innerHTML = '<p class="empty-hint" style="color:#C4928A;padding:24px 0;">載入失敗</p>';
    }
}

function renderBatches() {
    const el = document.getElementById('batchList');
    if (!_batchData.length) {
        el.innerHTML = '<p class="empty-hint" style="padding:24px 0;">尚無進貨紀錄</p>';
        return;
    }
    el.innerHTML = _batchData.map(b => {
        const bunches = Number(b.totalBunches) || 0;
        const items   = Number(b.totalItems)   || 0;
        const cost    = Number(b.totalCost)    || 0;
        // 摘要：X 種 / Y 把
        const qtyText = bunches > 0
            ? `${items} 種 · ${bunches} 把`
            : `${items} 種`;

        return `
        <div class="batch-row ${_expandedBatch===b.batchId?'expanded':''}" onclick="toggleBatch('${b.batchId}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div style="flex:1;min-width:0;">
                    <p style="font-weight:700;font-size:13px;color:#3D2E1E;">${b.source || '—'}</p>
                    <p style="font-size:11px;color:#A89278;margin-top:3px;">${String(b.date||'').slice(0,10)} · ${b.store||''}</p>
                    <!-- ★ 正確顯示數量摘要 -->
                    <p style="font-size:11px;color:#6d7756;margin-top:2px;font-weight:600;">${qtyText}</p>
                </div>
                <div style="text-align:right;display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;">
                    <div>
                        <p style="font-weight:700;color:#6d7756;font-size:14px;">NT$ ${cost.toLocaleString()}</p>
                        <p style="font-size:10px;color:#C4A87A;margin-top:2px;">${_expandedBatch===b.batchId?'▲ 收合':'▼ 展開'}</p>
                    </div>
                    <button onclick="event.stopPropagation();openEditBatch('${b.batchId}')" style="background:#F5EFE6;border:1.5px solid #DDD0BC;border-radius:8px;padding:5px 10px;font-size:11px;color:#7A6550;cursor:pointer;font-weight:600;white-space:nowrap;">✏️ 編輯</button>
                </div>
            </div>
            ${_expandedBatch === b.batchId ? `<div id="detail-${b.batchId}" style="margin-top:10px;border-top:1px solid #EDE5D8;padding-top:10px;">
                <p style="font-size:11px;color:#A89278;padding:8px 0;">載入品項中...</p>
            </div>` : ''}
        </div>`;
    }).join('');

    if (_expandedBatch) loadBatchItems(_expandedBatch);
}

async function toggleBatch(batchId) {
    _expandedBatch = _expandedBatch === batchId ? null : batchId;
    renderBatches();
}

async function loadBatchItems(batchId) {
    const el = document.getElementById(`detail-${batchId}`);
    if (!el) return;
    try {
        const res   = await fetch(`${API_URL}?action=getProcurementItems&batchId=${encodeURIComponent(batchId)}`);
        const items = await res.json();
        if (!Array.isArray(items) || !items.length) {
            el.innerHTML = '<p style="font-size:12px;color:#A89278;padding:8px 0;">無品項資料</p>';
            return;
        }
        el.innerHTML = items.map(it => `
        <div class="item-detail-row">
            <div>
                <span style="font-size:13px;font-weight:700;color:#3D2E1E;">${it.flowerName}</span>
                <span style="font-size:10px;color:#A89278;margin-left:6px;">${it.category}</span>
            </div>
            <div style="text-align:right;font-size:12px;">
                <span style="color:#6d7756;font-weight:700;">${it.bunchesQty}把/${it.totalStems}枝</span>
                <span style="background:#f0f3ec;color:#6d7756;border-radius:8px;padding:2px 8px;margin-left:6px;font-size:11px;">建議 NT$${it.suggestedPrice}</span>
            </div>
        </div>
        <div style="font-size:11px;color:#A89278;padding-bottom:6px;">
            ${it.stemsPerBunch}枝/把 · 每把 NT$${it.pricePerBunch} · 枝成本 NT$${Number(it.costPerStem).toFixed(1)}
        </div>`).join('');
    } catch(e) {
        el.innerHTML = '<p style="font-size:12px;color:#C4928A;padding:8px 0;">載入失敗</p>';
    }
}

// ══ 進貨紀錄編輯 ══
let _editBatchId   = null;
let _editBatchItems = [];

async function openEditBatch(batchId) {
    _editBatchId = batchId;
    const batch = _batchData.find(b => b.batchId === batchId);
    if (!batch) return;

    document.getElementById('edit-source').value = batch.source || '';
    document.getElementById('edit-date').value   = String(batch.date || '').slice(0, 10);
    document.getElementById('edit-note').value   = batch.note || '';
    document.getElementById('editBatchModal').style.display = 'flex';
    document.getElementById('editItemsList').innerHTML = '<p style="font-size:12px;color:#A89278;padding:8px 0;">載入品項中...</p>';

    try {
        const res = await fetch(`${API_URL}?action=getProcurementItems&batchId=${encodeURIComponent(batchId)}`);
        _editBatchItems = await res.json();
        renderEditItems();
    } catch(e) {
        document.getElementById('editItemsList').innerHTML = '<p style="font-size:12px;color:#C4928A;padding:8px 0;">載入失敗</p>';
    }
}

function renderEditItems() {
    const el = document.getElementById('editItemsList');
    if (!Array.isArray(_editBatchItems) || !_editBatchItems.length) {
        el.innerHTML = '<p style="font-size:12px;color:#A89278;padding:8px 0;">無品項資料</p>';
        return;
    }
    el.innerHTML = _editBatchItems.map((it, i) => `
    <div style="background:#F5EFE6;border-radius:12px;padding:12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:12px;font-weight:700;color:#7A6550;">品項 ${i+1}</span>
            <button onclick="removeEditItem(${i})" style="background:rgba(196,146,138,0.12);border:none;border-radius:8px;padding:3px 10px;font-size:12px;color:#C4928A;cursor:pointer;">刪除</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <div>
                <label class="f-label-xs">花材名稱</label>
                <input type="text" class="f-input-sm" value="${escHtml(it.flowerName||'')}" oninput="_editBatchItems[${i}].flowerName=this.value">
            </div>
            <div>
                <label class="f-label-xs">分類</label>
                <select class="f-select-sm" onchange="_editBatchItems[${i}].category=this.value">
                    <option ${it.category==='主花'?'selected':''}>主花</option>
                    <option ${it.category==='配花'?'selected':''}>配花</option>
                    <option ${it.category==='葉材'?'selected':''}>葉材</option>
                    <option ${it.category==='其他'?'selected':''}>其他</option>
                </select>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div>
                <label class="f-label-xs">枝/把</label>
                <input type="number" min="1" class="f-input-sm" value="${it.stemsPerBunch||''}" oninput="_editBatchItems[${i}].stemsPerBunch=Number(this.value)||0">
            </div>
            <div>
                <label class="f-label-xs">購入把數</label>
                <input type="number" min="1" class="f-input-sm" value="${it.bunchesQty||''}" oninput="_editBatchItems[${i}].bunchesQty=Number(this.value)||0">
            </div>
            <div>
                <label class="f-label-xs">每把單價</label>
                <input type="number" min="0" class="f-input-sm" value="${it.pricePerBunch||''}" oninput="_editBatchItems[${i}].pricePerBunch=Number(this.value)||0">
            </div>
        </div>
    </div>`).join('');
}

function removeEditItem(idx) {
    if (!confirm(`確定刪除品項「${_editBatchItems[idx].flowerName||'(未命名)'}」？`)) return;
    _editBatchItems.splice(idx, 1);
    renderEditItems();
}

async function saveEditBatch() {
    if (!API_URL) return alert('請先設定 API 網址');
    const payload = {
        action: 'updateProcurementBatch',
        data: {
            batchId: _editBatchId,
            source : document.getElementById('edit-source').value.trim(),
            date   : document.getElementById('edit-date').value,
            note   : document.getElementById('edit-note').value.trim(),
            items  : _editBatchItems,
        }
    };
    try {
        setGas('loading');
        const res    = await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success) {
            setGas('ok');
            showToast('✅ 進貨紀錄已更新');
            closeEditBatch();
            loadBatches();
        } else {
            setGas('error');
            alert('儲存失敗：' + (result.error || '未知錯誤'));
        }
    } catch(e) {
        setGas('error');
        alert('連線失敗，請確認 API 網址');
    }
}

function closeEditBatch() {
    document.getElementById('editBatchModal').style.display = 'none';
    _editBatchId    = null;
    _editBatchItems = [];
}

document.getElementById('editBatchModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditBatch();
});

// ══ Toast ══
let _toastTimer;
function showToast(msg, dur=2500) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ══ 初始化 ══
async function init() {
    if (!API_URL) {
        setGas('error');
        document.getElementById('gasLabel').innerText = '未設定';
        return;
    }
    setGas('loading');
    const today = new Intl.DateTimeFormat('sv-SE', { timeZone:'Asia/Taipei' }).format(new Date());
    document.getElementById('procDate').value = today;
    setStore('高雄FOCUS 13');
    await loadFlowerLibrary();
    setGas('ok');
    loadBatches();
}

window.onload = init;
</script>
