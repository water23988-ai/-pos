<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 後台報表</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { font-family: 'Noto Sans TC', -apple-system, sans-serif; box-sizing: border-box; }
        body { background: #F0E9DF; color: #3D2E1E; overflow-x: hidden; -webkit-font-smoothing: antialiased; margin: 0; }

        /* 側邊欄 */
        .side-nav { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #E5D2B8; border-right: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; z-index: 200; box-shadow: 2px 0 12px rgba(0,0,0,0.06); }
        .nav-brand { padding: 22px 18px 18px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; gap: 10px; }
        .nav-brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #8e9775, #6d7756); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-brand-name { font-size: 14px; font-weight: 800; color: #3d2e1e; }
        .nav-brand-sub { font-size: 10px; color: #a08060; margin-top: 2px; }
        .nav-section-label { font-size: 9px; font-weight: 700; color: #b8976a; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 18px 6px; }
        .nav-items { flex: 1; padding: 10px 8px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #7a5c3a; font-size: 13px; font-weight: 500; text-decoration: none; border-radius: 10px; margin-bottom: 2px; transition: all 0.15s; }
        .nav-item:hover { background: rgba(0,0,0,0.05); color: #3d2e1e; }
        .nav-item.active { background: rgba(109,119,86,0.15); color: #4d3520; font-weight: 700; }
        .nav-icon { font-size: 17px; flex-shrink: 0; }
        .nav-bottom { padding: 12px 8px 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .gas-status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; background: rgba(0,0,0,0.06); font-size: 11px; color: #a08060; }
        .gas-status-bar button { background: rgba(0,0,0,0.06); border: none; border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; margin-left: auto; }

        /* 主內容 */
        .main-area { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
        .main-header { background: #FAF7F2; border-bottom: 1px solid #DDD0BC; padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .main-header-title { font-size: 16px; font-weight: 800; color: #3D2E1E; }
        .main-content { padding: 20px; }

        /* 通用卡片 */
        .card { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; padding: 20px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .card-title { font-size: 11px; font-weight: 700; color: #A89278; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }

        /* 表單元素 */
        .f-input { width: 100%; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 10px 13px; font-size: 14px; outline: none; background: #F5EFE6; color: #3D2E1E; transition: all 0.15s; }
        .f-input:focus { border-color: #8e9775; background: #FAF7F2; box-shadow: 0 0 0 3px rgba(142,151,117,0.1); }
        .f-label { font-size: 11px; font-weight: 600; color: #A89278; letter-spacing: 0.04em; text-transform: uppercase; display: block; margin-bottom: 6px; }

        /* 按鈕 */
        .btn-primary { background: #8e9775; color: white; border: none; border-radius: 12px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #C8B89A; cursor: not-allowed; }
        .btn-secondary { background: #F5EFE6; color: #7A6550; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-secondary:hover { background: #EDE5D8; }

        /* Chips */
        .chip { border: 1.5px solid #DDD0BC; background: #FAF7F2; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: #7A6550; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .chip.active { border-color: #8e9775; background: #f0f3ec; color: #4d6145; font-weight: 700; }

        /* GAS dot */
        .gas-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; background: #C8B89A; flex-shrink: 0; }
        .gas-dot.ok { background: #8E9775; }
        .gas-dot.loading { background: #C4A87A; animation: blink 0.8s infinite; }
        .gas-dot.error { background: #C4928A; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Toast */
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #7A6550; color: white; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* API Modal */
        .api-modal { display: none; position: fixed; inset: 0; background: rgba(61,46,30,0.45); backdrop-filter: blur(6px); z-index: 400; align-items: center; justify-content: center; }
        .api-modal.show { display: flex; }
        .api-modal-box { background: #FAF7F2; border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; margin: 16px; border: 1px solid #DDD0BC; }

        /* 摘要卡片 */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .summary-card { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; padding: 18px 20px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .summary-card-label { font-size: 11px; font-weight: 700; color: #A89278; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
        .summary-card-value { font-size: 26px; font-weight: 800; color: #3D2E1E; line-height: 1.1; }
        .summary-card-sub { font-size: 11px; color: #A89278; margin-top: 6px; }
        .summary-card.accent { border-color: #8e9775; background: #f0f3ec; }
        .summary-card.accent .summary-card-value { color: #4d6145; }

        /* 查詢列 */
        .query-bar { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .query-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .query-date-input { border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 9px 14px; font-size: 14px; outline: none; background: #F5EFE6; color: #3D2E1E; transition: all 0.15s; }
        .query-date-input:focus { border-color: #8e9775; background: #FAF7F2; box-shadow: 0 0 0 3px rgba(142,151,117,0.1); }
        .store-filter-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .filter-label { font-size: 10px; font-weight: 700; color: #A89278; letter-spacing: 0.08em; text-transform: uppercase; }

        /* 表格 */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #F5EFE6; color: #7A6550; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid #DDD0BC; white-space: nowrap; }
        tbody tr { border-bottom: 1px solid #EDE5D8; transition: background 0.1s; }
        tbody tr:hover { background: #F5EFE6; }
        tbody tr:last-child { border-bottom: none; }
        tbody td { padding: 11px 14px; font-size: 13px; color: #3D2E1E; }
        .td-store { font-size: 11px; background: #F5EFE6; color: #7A6550; border-radius: 6px; padding: 3px 9px; font-weight: 600; white-space: nowrap; }
        .td-pay { font-size: 11px; color: #8A9BA8; background: rgba(138,155,168,0.1); border-radius: 6px; padding: 3px 9px; white-space: nowrap; }
        .td-amount { font-weight: 700; color: #4d6145; }
        .empty-table { text-align: center; padding: 40px; color: #A89278; font-size: 13px; }

        /* 點位業績卡片 */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-top: 20px; }
        .store-perf-card { background: #FAF7F2; border-radius: 14px; border: 1px solid #DDD0BC; padding: 16px 18px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .store-perf-name { font-size: 12px; font-weight: 700; color: #7A6550; margin-bottom: 8px; }
        .store-perf-sales { font-size: 20px; font-weight: 800; color: #3D2E1E; }
        .store-perf-count { font-size: 11px; color: #A89278; margin-top: 4px; }
        .store-perf-bar { height: 4px; background: #EDE5D8; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .store-perf-bar-fill { height: 100%; background: #8e9775; border-radius: 2px; transition: width 0.6s ease; }

        /* loading spinner */
        .loading-row { text-align: center; padding: 40px; color: #A89278; font-size: 13px; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #DDD0BC; border-top-color: #8e9775; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="toast"></div>

<!-- API Modal -->
<div class="api-modal" id="apiModal">
    <div class="api-modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">⚙️ 連線設定</h3>
            <button onclick="closeApiModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <label class="f-label">API URL</label>
        <input type="text" id="apiInput" class="f-input" style="margin-bottom:14px;" placeholder="貼上 GAS 部署網址">
        <button onclick="saveApi()" class="btn-primary" style="width:100%;">儲存並連線</button>
    </div>
</div>

<!-- 側邊欄 -->
<nav class="side-nav" id="sideNav">
    <div class="nav-brand">
        <div class="nav-brand-icon">🌸</div>
        <div>
            <div class="nav-brand-name">拾逅花事</div>
            <div class="nav-brand-sub">Moment Flor · POS</div>
        </div>
    </div>
    <div class="nav-items">
        <div class="nav-section-label">主要功能</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">🛒</span>收銀台</a>
        <a href="sales.html" class="nav-item"><span class="nav-icon">🔍</span>銷售紀錄</a>
        <div class="nav-section-label">管理工具</div>
        <a href="procurement.html" class="nav-item"><span class="nav-icon">🚚</span>進貨管理</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">🌹</span>商品管理</a>
        <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span>庫存管理</a>
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span>後台報表</a>
    </div>
    <div class="nav-bottom">
        <div class="gas-status-bar">
            <span class="gas-dot" id="gasDot"></span>
            <span id="gasLabel">—</span>
            <span>GAS 連線</span>
            <button onclick="openApiModal()" title="API 設定">⚙️</button>
        </div>
    </div>
</nav>

<!-- 主區域 -->
<div class="main-area">
    <!-- Header -->
    <div class="main-header">
        <div class="main-header-title">📊 後台報表</div>
        <div style="display:flex;align-items:center;gap:10px;">
            <span id="dateDisplay" style="font-size:12px;color:#A89278;"></span>
            <button onclick="refreshAll()" class="btn-secondary" style="padding:7px 16px;font-size:12px;">重新整理</button>
        </div>
    </div>

    <!-- 主內容 -->
    <div class="main-content">

        <!-- 摘要卡片 4格 -->
        <div class="summary-grid">
            <div class="summary-card accent">
                <div class="summary-card-label">今日業績</div>
                <div class="summary-card-value" id="statTodaySales">—</div>
                <div class="summary-card-sub" id="statTodaySalesSub">載入中</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-label">今日筆數</div>
                <div class="summary-card-value" id="statTodayCount">—</div>
                <div class="summary-card-sub" id="statTodayCountSub">載入中</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-label">本月業績</div>
                <div class="summary-card-value" id="statMonthSales">—</div>
                <div class="summary-card-sub" id="statMonthSalesSub">載入中</div>
            </div>
            <div class="summary-card">
                <div class="summary-card-label">平均客單</div>
                <div class="summary-card-value" id="statAvgOrder">—</div>
                <div class="summary-card-sub" id="statAvgOrderSub">載入中</div>
            </div>
        </div>

        <!-- 日期查詢列 -->
        <div class="query-bar">
            <div class="query-row">
                <div>
                    <label class="f-label" style="margin-bottom:4px;">查詢日期</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="date" id="queryDate" class="query-date-input">
                        <button onclick="queryReport()" class="btn-primary" style="padding:10px 20px;font-size:13px;">查詢</button>
                        <button onclick="queryToday()" class="btn-secondary" style="padding:9px 16px;font-size:12px;">今天</button>
                        <button onclick="queryYesterday()" class="btn-secondary" style="padding:9px 16px;font-size:12px;">昨天</button>
                    </div>
                </div>
            </div>
            <div class="store-filter-row">
                <span class="filter-label">點位篩選</span>
                <button class="chip active" onclick="setStoreFilter(this,'全部')">全部</button>
                <button class="chip" onclick="setStoreFilter(this,'高雄')">高雄 FOCUS</button>
                <button class="chip" onclick="setStoreFilter(this,'台南')">台南 FOCUS</button>
                <button class="chip" onclick="setStoreFilter(this,'誠品')">誠品台南</button>
                <button class="chip" onclick="setStoreFilter(this,'Studio')">Studio</button>
            </div>
        </div>

        <!-- 銷售明細表格 -->
        <div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
            <div style="padding:16px 20px;border-bottom:1px solid #EDE5D8;display:flex;justify-content:space-between;align-items:center;">
                <div class="card-title" style="margin-bottom:0;">銷售明細</div>
                <span id="tableCount" style="font-size:11px;color:#A89278;">— 筆</span>
            </div>
            <div class="table-wrap">
                <table id="salesTable">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>點位</th>
                            <th>商品</th>
                            <th>金額</th>
                            <th>付款方式</th>
                            <th>客源</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody">
                        <tr><td colspan="6" class="empty-table">請選擇日期查詢</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 點位業績卡片列 -->
        <div class="card-title" style="margin-bottom:8px;">各點位業績</div>
        <div class="store-grid" id="storeGrid">
            <!-- 動態填入 -->
        </div>

    </div>
</div>

<script>
let API_URL = localStorage.getItem('moment_flor_api') || '';
let currentFilter = '全部';
let rawData = [];
const STORES = [
    { key: '高雄FOCUS 13', label: '高雄 FOCUS', filter: '高雄' },
    { key: '台南FOCUS',    label: '台南 FOCUS', filter: '台南' },
    { key: '誠品生活台南', label: '誠品台南',   filter: '誠品' },
    { key: 'Studio',       label: 'Studio',     filter: 'Studio' },
    { key: '小花站',       label: '小花站',     filter: '小花站' },
];

// ══ API Modal ══
function openApiModal() {
    document.getElementById('apiInput').value = API_URL;
    document.getElementById('apiModal').classList.add('show');
}
function closeApiModal() {
    document.getElementById('apiModal').classList.remove('show');
}
document.getElementById('apiModal').addEventListener('click', function(e) {
    if (e.target === this) closeApiModal();
});

function saveApi() {
    const v = document.getElementById('apiInput').value.trim();
    if (!v) return;
    localStorage.setItem('moment_flor_api', v);
    API_URL = v;
    closeApiModal();
    init();
}

// ══ GAS 狀態 ══
function setGas(state) {
    const dot   = document.getElementById('gasDot');
    const label = document.getElementById('gasLabel');
    dot.className = 'gas-dot ' + state;
    if (state === 'loading') label.innerText = '同步中';
    if (state === 'ok')      label.innerText = '正常';
    if (state === 'error')   label.innerText = '錯誤';
}

// ══ 日期工具 ══
function getToday() {
    return new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Taipei' }).format(new Date());
}
function getYesterday() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Taipei' }).format(d);
}
function queryToday() {
    document.getElementById('queryDate').value = getToday();
    queryReport();
}
function queryYesterday() {
    document.getElementById('queryDate').value = getYesterday();
    queryReport();
}
function formatTime(ts) {
    if (!ts) return '—';
    const s = String(ts);
    if (s.length >= 16) return s.slice(11, 16);
    return s;
}

// ══ 點位篩選 ══
function setStoreFilter(btn, val) {
    document.querySelectorAll('.store-filter-row .chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = val;
    renderTable();
    renderStoreGrid();
}

// ══ 摘要卡片 ══
async function loadSummary() {
    if (!API_URL) return;
    const today = getToday();
    const ym = today.slice(0, 7); // YYYY-MM
    try {
        const [todayRes, monthRes] = await Promise.all([
            fetch(`${API_URL}?action=getDailyReport&date=${today}`),
            fetch(`${API_URL}?action=getDailyReport&date=${ym}&mode=month`)
        ]);
        const todayData  = await todayRes.json();
        const monthData  = await monthRes.json();

        const todaySales = todayData.totalSales || 0;
        const todayCount = todayData.totalCount || 0;
        const monthSales = monthData.totalSales || 0;
        const avg = todayCount > 0 ? Math.round(todaySales / todayCount) : 0;

        document.getElementById('statTodaySales').innerText  = 'NT$ ' + todaySales.toLocaleString();
        document.getElementById('statTodayCount').innerText  = todayCount + ' 筆';
        document.getElementById('statMonthSales').innerText  = 'NT$ ' + monthSales.toLocaleString();
        document.getElementById('statAvgOrder').innerText    = avg > 0 ? 'NT$ ' + avg.toLocaleString() : '—';

        document.getElementById('statTodaySalesSub').innerText  = today;
        document.getElementById('statTodayCountSub').innerText  = '今日交易';
        document.getElementById('statMonthSalesSub').innerText  = ym + ' 累計';
        document.getElementById('statAvgOrderSub').innerText    = '今日平均';
    } catch(e) {
        ['statTodaySales','statTodayCount','statMonthSales','statAvgOrder'].forEach(id => {
            document.getElementById(id).innerText = '—';
        });
        ['statTodaySalesSub','statTodayCountSub','statMonthSalesSub','statAvgOrderSub'].forEach(id => {
            document.getElementById(id).innerText = '無法載入';
        });
    }
}

// ══ 查詢報表 ══
async function queryReport() {
    const date = document.getElementById('queryDate').value;
    if (!date) return showToast('請選擇日期');
    if (!API_URL) { showToast('請先設定 API 網址'); openApiModal(); return; }

    setGas('loading');
    const tbody = document.getElementById('salesTableBody');
    tbody.innerHTML = `<tr><td colspan="6" class="loading-row"><span class="spinner"></span>載入中...</td></tr>`;

    try {
        const store = currentFilter === '全部' ? '' : currentFilter;
        const res  = await fetch(`${API_URL}?action=getDailyReport&date=${date}&store=${encodeURIComponent(store)}`);
        rawData    = await res.json();
        if (!Array.isArray(rawData)) rawData = rawData.records || rawData.data || [];
        setGas('ok');
        renderTable();
        renderStoreGrid();
        showToast(`✅ 已載入 ${rawData.length} 筆`);
    } catch(e) {
        setGas('error');
        tbody.innerHTML = `<tr><td colspan="6" class="empty-table" style="color:#C4928A;">載入失敗，請確認 API 連線</td></tr>`;
    }
}

function renderTable() {
    const tbody = document.getElementById('salesTableBody');
    let rows = rawData;
    if (currentFilter !== '全部') {
        rows = rawData.filter(r => {
            const s = (r.store || r.點位 || '').toLowerCase();
            return s.includes(currentFilter.toLowerCase());
        });
    }
    document.getElementById('tableCount').innerText = rows.length + ' 筆';
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-table">此條件查無資料</td></tr>`;
        return;
    }
    tbody.innerHTML = rows.map(r => {
        const time   = formatTime(r.time || r.時間 || r.timestamp || '');
        const store  = r.store || r.點位 || '—';
        const item   = r.item || r.product || r.商品 || '—';
        const amount = Number(r.amount || r.金額 || r.total || 0);
        const pay    = r.payment || r.付款方式 || '—';
        const src    = r.source || r.客源 || '—';
        return `<tr>
            <td style="color:#A89278;font-size:12px;">${time}</td>
            <td><span class="td-store">${store}</span></td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item}</td>
            <td class="td-amount">NT$ ${amount.toLocaleString()}</td>
            <td><span class="td-pay">${pay}</span></td>
            <td style="font-size:12px;color:#7A6550;">${src}</td>
        </tr>`;
    }).join('');
}

function renderStoreGrid() {
    const grid = document.getElementById('storeGrid');
    const totals = {};
    let maxSales = 0;

    rawData.forEach(r => {
        const s = r.store || r.點位 || '其他';
        if (!totals[s]) totals[s] = { sales: 0, count: 0 };
        totals[s].sales += Number(r.amount || r.金額 || r.total || 0);
        totals[s].count++;
        if (totals[s].sales > maxSales) maxSales = totals[s].sales;
    });

    if (!Object.keys(totals).length) {
        grid.innerHTML = '<p style="color:#A89278;font-size:13px;grid-column:1/-1;">請先查詢日期以查看各點位業績</p>';
        return;
    }

    grid.innerHTML = Object.entries(totals)
        .sort((a, b) => b[1].sales - a[1].sales)
        .map(([store, data]) => {
            const pct = maxSales > 0 ? Math.round(data.sales / maxSales * 100) : 0;
            return `<div class="store-perf-card">
                <div class="store-perf-name">${store}</div>
                <div class="store-perf-sales">NT$ ${data.sales.toLocaleString()}</div>
                <div class="store-perf-count">${data.count} 筆交易</div>
                <div class="store-perf-bar">
                    <div class="store-perf-bar-fill" style="width:${pct}%"></div>
                </div>
            </div>`;
        }).join('');
}

// ══ Toast ══
let _toastTimer;
function showToast(msg, dur=2500) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ══ 整體刷新 ══
function refreshAll() {
    loadSummary();
    const date = document.getElementById('queryDate').value;
    if (date) queryReport();
}

// ══ 初始化 ══
function init() {
    const today = getToday();
    document.getElementById('queryDate').value = today;
    document.getElementById('dateDisplay').innerText = today;

    if (!API_URL) {
        setGas('error');
        document.getElementById('gasLabel').innerText = '未設定';
        return;
    }
    setGas('loading');
    loadSummary().then(() => setGas('ok'));
    queryReport();
}

window.onload = init;
</script>
