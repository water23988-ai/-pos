<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        * { font-family: 'Noto Serif TC', serif; }
        body { background: #fcfbf9; color: #4a4a4a; }
        .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #e5e7eb; background: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { border-color: #8e9775; background: #f1f3eb; color: #6d7756; font-weight: bold; }
        .inv-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 10px; background: #fafaf9; border: 1px solid #f3f4f6; margin-bottom: 6px; }
        .stock-badge { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 12px; }
        .stock-ok   { background: #dcfce7; color: #16a34a; }
        .stock-low  { background: #fef9c3; color: #ca8a04; }
        .stock-zero { background: #fee2e2; color: #dc2626; }
        .s-input { width: 100%; border: 2px solid #e8ddd0; border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; background: white; transition: border-color 0.2s; }
        .s-input:focus { border-color: #8e9775; }
        .btn-primary { background: #8e9775; color: white; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s; font-family: 'Noto Serif TC', serif; }
        .btn-primary:active { opacity: 0.8; }
        .gas-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #9ca3af; }
        .gas-dot.ok      { background: #22c55e; }
        .gas-dot.loading { background: #f59e0b; animation: blink 0.8s infinite; }
        .gas-dot.error   { background: #ef4444; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2e2926; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 500; opacity: 0; transition: all 0.25s ease; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-header { font-size: 10px; font-weight: bold; color: #9ca3af; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 14px 4px; }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- Header -->

<div class="bg-white border-b-2 border-[#8e9775] px-4 py-3 flex justify-between items-center sticky top-0 z-40 shadow-sm">
    <div>
        <h1 class="text-base font-bold text-[#8e9775]">📦 拾逅花事 | 盤點系統</h1>
        <p id="statusInfo" class="text-[10px] text-gray-400 italic">連接中...</p>
    </div>
    <div class="flex items-center gap-2">
        <span class="gas-dot" id="gasDot"></span>
        <nav class="flex gap-1">
            <a href="index.html"    class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">POS</a>
            <a href="products.html" class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">商品</a>
            <a href="dashboard.html" class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">後台</a>
        </nav>
    </div>
</div>

<!-- 據點選擇器（防呆大按鈕）-->
<div class="bg-[#f1f3eb] border-b border-[#d4dbc6] px-4 py-2">
    <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1.5">目前操作據點</p>
    <div class="grid grid-cols-3 gap-2">
        <button onclick="setStore('高雄FOCUS 13')" id="btn-kh"
            class="store-btn py-2.5 rounded-xl text-sm font-bold border-2 transition-all">高雄 FOCUS</button>
        <button onclick="setStore('台南FOCUS')" id="btn-tn"
            class="store-btn py-2.5 rounded-xl text-sm font-bold border-2 transition-all">台南 FOCUS</button>
        <button onclick="setStore('誠品生活台南')" id="btn-es"
            class="store-btn py-2.5 rounded-xl text-sm font-bold border-2 transition-all">誠品台南</button>
    </div>
</div>
<style>
.store-btn { background: white; border-color: #e5e7eb; color: #9ca3af; }
.store-btn.active { background: #8e9775; border-color: #8e9775; color: white; box-shadow: 0 2px 8px rgba(142,151,117,0.35); }
</style>

<!-- 分頁切換 -->

<div class="p-4 pb-0 flex gap-3 overflow-x-auto no-scrollbar">
    <button onclick="switchTab('stock')"   id="tab-stock"   class="tab-btn active flex-shrink-0">📋 庫存盤點</button>
    <button onclick="switchTab('receive')" id="tab-receive" class="tab-btn flex-shrink-0">📥 進貨入庫</button>
    <button onclick="switchTab('status')"  id="tab-status"  class="tab-btn flex-shrink-0">📜 盤點記錄</button>
</div>

<!-- ══ Tab 1: 庫存盤點 ══ -->

<div id="tab-stock-view" class="p-4">
    <div class="flex gap-2 mb-4">
        <input type="text" id="stockSearch" placeholder="搜尋品項..." oninput="renderStockList()"
            class="flex-1 border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:border-[#8e9775]">
        <button onclick="refreshProducts()" class="border border-gray-200 rounded-xl px-3 py-2 text-xs text-gray-400">🔄</button>
    </div>
    <div id="stockList">
        <p class="text-center text-gray-300 text-xs py-12">載入中...</p>
    </div>
</div>

<!-- ══ Tab 2: 進貨入庫 ══ -->

<div id="tab-receive-view" class="p-4 hidden">

    <!-- 已選品項資訊列 -->
    <div id="selectedProductArea" class="hidden bg-[#f1f3eb] border border-[#8e9775] rounded-xl p-4 mb-4">
        <div class="flex justify-between items-center mb-2">
            <span id="selectedProductName" class="font-bold text-sm text-[#6d7756]"></span>
            <button onclick="clearSelectedProduct()" class="text-[10px] text-red-400 border border-red-200 px-2 py-1 rounded-full">取消</button>
        </div>
        <!-- 三店庫存快覽 -->
        <div class="grid grid-cols-3 gap-2 text-center text-xs">
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">高雄</div>
                <div class="font-bold text-[#8e9775]" id="rStock-kh">—</div>
            </div>
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">台南</div>
                <div class="font-bold text-[#8e9775]" id="rStock-tn">—</div>
            </div>
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">誠品</div>
                <div class="font-bold text-[#8e9775]" id="rStock-es">—</div>
            </div>
        </div>
    </div>

    <!-- 品項搜尋列表 -->
    <div id="receiveProductPicker">
        <!-- Tab 切換 -->
        <div class="flex gap-1 mb-3 bg-gray-100 rounded-xl p-1">
            <button onclick="setPickerTab('products')" id="ptab-products"
                class="flex-1 text-xs py-2 rounded-lg bg-white font-bold shadow-sm text-[#6d7756] transition">商品庫</button>
            <button onclick="setPickerTab('library')" id="ptab-library"
                class="flex-1 text-xs py-2 rounded-lg text-gray-400 transition">🌸 花材資料庫</button>
        </div>

        <!-- 商品庫 Tab -->
        <div id="productsPickerTab">
            <input type="text" id="receiveSearch" placeholder="搜尋品項名稱..." oninput="renderReceiveList()"
                class="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:border-[#8e9775] mb-2">
            <div id="receiveProductList">
                <p class="text-center text-gray-300 text-xs py-8">載入中...</p>
            </div>
        </div>

        <!-- 花材資料庫 Tab — 多選本週進花 -->
        <div id="libraryPickerTab" class="hidden">
            <div class="flex gap-2 mb-2">
                <input type="text" id="librarySearch" placeholder="搜尋花材名稱或類別..." oninput="renderLibraryList()"
                    class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-[#8e9775]">
                <button onclick="clearLibrarySelection()" class="text-xs text-gray-400 border border-gray-200 px-3 py-2 rounded-xl whitespace-nowrap">清除</button>
            </div>
            <!-- 已選計數 + 進入填資料按鈕 -->
            <div id="librarySelBanner" class="hidden mb-3 bg-[#f1f3eb] border border-[#c6cdb5] rounded-xl px-4 py-3 flex items-center justify-between">
                <span class="text-sm text-[#6d7756] font-bold">已選 <span id="librarySelCount">0</span> 種花材</span>
                <button onclick="openWeeklyImport()" class="bg-[#8e9775] text-white text-sm font-bold px-5 py-2 rounded-xl">填入進貨資料 →</button>
            </div>
            <p class="text-[10px] text-gray-400 mb-2">勾選本週採購的花材，再點「填入進貨資料」</p>
            <div id="libraryList">
                <p class="text-center text-gray-300 text-xs py-8">點此載入花材資料庫...</p>
            </div>
        </div>
    </div>

    <!-- 進貨表單：多店分配 -->
    <div id="receiveForm" class="hidden bg-white rounded-2xl border border-gray-100 p-5 space-y-4">

        <!-- 進貨數量（員工不接觸定價，定價在商品管理頁設定）-->

        <!-- 三店進貨分配 -->
        <div>
            <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">各店進貨數量（枝）</label>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">高雄</div>
                    <input type="number" id="receiveQtyKH" placeholder="0" min="0" class="s-input text-center">
                </div>
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">台南</div>
                    <input type="number" id="receiveQtyTN" placeholder="0" min="0" class="s-input text-center">
                </div>
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">誠品</div>
                    <input type="number" id="receiveQtyES" placeholder="0" min="0" class="s-input text-center">
                </div>
            </div>
            <div id="receiveTotalHint" class="text-center text-xs text-gray-400 mt-2">合計：0 枝</div>
        </div>

        <div>
            <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">備註（選填）</label>
            <input type="text" id="receiveNote" placeholder="進貨廠商、批次..." class="s-input">
        </div>
        <div class="flex gap-3">
            <button onclick="addToBatch()" class="btn-primary flex-1">＋ 加入清單</button>
            <button onclick="submitReceive()" class="btn-primary flex-1" id="receiveSubmitBtn" style="background:#6b9080;">✅ 僅此項入庫</button>
        </div>
    </div>

    <!-- 批次清單 -->
    <div id="batchPanel" class="hidden mt-4">
        <div class="flex justify-between items-center mb-2">
            <div class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">📦 待入庫清單</div>
            <button onclick="submitBatch()" id="batchSubmitBtn" class="text-xs bg-[#8e9775] text-white px-4 py-2 rounded-xl font-bold">全部送出</button>
        </div>
        <div id="batchList" class="space-y-2"></div>
    </div>

</div>

<!-- ══ Tab 3: 庫存狀況 ══ -->

<div id="tab-status-view" class="p-4 hidden">
    <div id="statusList">
        <p class="text-center text-gray-300 text-xs py-12">載入中...</p>
    </div>
</div>

<!-- 盤點調整 Modal -->

<div id="adjustModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-xs">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-base" id="adjustTitle">調整庫存</h3>
            <button onclick="closeAdjustModal()" class="text-gray-300 text-xl">✕</button>
        </div>
        <div class="text-xs text-gray-400 mb-3">
            目前庫存：<span id="adjustCurrentStock" class="font-bold text-[#8e9775]">—</span>
        </div>
        <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">調整後數量</label>
        <input type="number" id="adjustQtyInput" placeholder="輸入新的庫存數量" min="0" class="s-input mb-3">
        <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">調整原因（選填）</label>
        <input type="text" id="adjustNoteInput" placeholder="盤點調整、破損…" class="s-input mb-4">
        <button onclick="submitAdjust()" class="btn-primary">確認調整</button>
    </div>
</div>

<script>
const ADMIN_PASSWORD = '1234';
let API_URL          = localStorage.getItem('moment_flor_api') || '';
let currentStore     = '高雄FOCUS 13';
function getStoreStock(p) {
    if (currentStore === '台南FOCUS')   return Number(p.stockTN)  || 0;
    if (currentStore === '誠品生活台南') return Number(p.stockES) || 0;
    return Number(p.stockKH) || 0;
}
let rawProducts      = [];
let _adjustProduct   = null;
let _selectedProduct = null;
let _batchItems      = [];   // 批次進貨清單
let _flowerLibrary   = [];   // 花材資料庫快取
let _pickerTab       = 'products';
let _toastTimer;

// ── 直接初始化（不需要密碼）──
window.onload = () => {
    if (!API_URL) {
        API_URL = prompt('請輸入 API URL：') || '';
        if (API_URL) localStorage.setItem('moment_flor_api', API_URL);
    }
    setStore('高雄FOCUS 13'); // 預設高雄，並高亮按鈕
    init();
};

// ── 初始化 ──
async function init() {
    setGas('loading');
    try {
        const res = await fetch(`${API_URL}?action=getProducts`);
        rawProducts = await res.json();
        document.getElementById('statusInfo').innerText = `✅ 已載入 ${rawProducts.length} 項`;
        setGas('ok');
        renderStockList();
        renderReceiveList();
    } catch(e) {
        document.getElementById('statusInfo').innerText = '❌ API 連線錯誤';
        setGas('error');
    }
}

async function refreshProducts() {
    setGas('loading');
    try {
        const res = await fetch(`${API_URL}?action=getProducts`);
        rawProducts = await res.json();
        setGas('ok');
        renderStockList();
        renderReceiveList();
        showToast('✅ 資料已更新');
    } catch(e) { setGas('error'); showToast('❌ 更新失敗'); }
}

// ── 門市切換 ──
function setStore(store) {
    currentStore = store;
    ['btn-kh','btn-tn','btn-es'].forEach(id => document.getElementById(id).classList.remove('active'));
    const map = { '高雄FOCUS 13':'btn-kh', '台南FOCUS':'btn-tn', '誠品生活台南':'btn-es' };
    if (map[store]) document.getElementById(map[store]).classList.add('active');
    renderStockList();
    clearSelectedProduct();
    renderReceiveList();
}

// ── Tab 切換 ──
function switchTab(tab) {
    ['stock','receive','status'].forEach(t => {
        document.getElementById(`tab-${t}-view`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'status') loadHistoryLog();
}

// ══ Tab 1: 庫存盤點 ══
const CAT_ORDER = ['主花','配花','葉材','花束','花瓶','其他加購'];

function renderStockList() {
    const keyword = (document.getElementById('stockSearch').value || '').trim().toLowerCase();
    const isKH    = currentStore !== '台南FOCUS';
    const catMap  = {};

    rawProducts.forEach(p => {
        if (keyword && !p.name.toLowerCase().includes(keyword)) return;
        const cat = p.category || '其他加購';
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(p);
    });

    const cats = Object.keys(catMap).sort((a,b) => {
        const ai = CAT_ORDER.indexOf(a); const bi = CAT_ORDER.indexOf(b);
        return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    if (!cats.length) {
        document.getElementById('stockList').innerHTML = '<p class="text-center text-gray-300 text-xs py-12">查無品項</p>';
        return;
    }

    document.getElementById('stockList').innerHTML = cats.map(cat => `
        <div class="cat-header">${cat}</div>
        ${catMap[cat].map(p => {
            const stock = getStoreStock(p);
            const badge = stock > 5 ? 'stock-ok' : stock > 0 ? 'stock-low' : 'stock-zero';
            return `<div class="inv-row">
                <div style="flex:1;min-width:0;">
                    <div style="font-size:13px;font-weight:bold;">${p.name}</div>
                </div>
                <span class="stock-badge ${badge}" style="margin-right:8px;">${stock} 枝</span>
                <button onclick="openReceiveFromList(${p.id})" style="background:#fdf1e4;border:1px solid #c4a882;border-radius:8px;padding:5px 10px;font-size:11px;color:#8a5a2a;cursor:pointer;margin-right:5px;font-family:'Noto Serif TC',serif;">進貨</button>
                <button onclick="openAdjustModal(${p.id})" style="background:#f1f3eb;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#6d7756;cursor:pointer;font-weight:bold;font-family:'Noto Serif TC',serif;">調整</button>
            </div>`;
        }).join('')}`).join('');
}

// 從庫存列表點進貨 → 切換到進貨頁並預選品項
function openReceiveFromList(id) {
    switchTab('receive');
    selectReceiveProduct(id);
}

// ── 調整 Modal ──
function openAdjustModal(id) {
    const p = rawProducts.find(x => Number(x.id) === Number(id));
    if (!p) return;
    _adjustProduct = p;
    const stock = getStoreStock(p);
    document.getElementById('adjustTitle').innerText = `調整：${p.name}`;
    document.getElementById('adjustCurrentStock').innerText = `${stock} 枝`;
    document.getElementById('adjustQtyInput').value = stock;
    document.getElementById('adjustNoteInput').value = '';
    document.getElementById('adjustModal').classList.remove('hidden');
    setTimeout(() => { const el = document.getElementById('adjustQtyInput'); el.focus(); el.select(); }, 100);
}
function closeAdjustModal() {
    document.getElementById('adjustModal').classList.add('hidden');
    _adjustProduct = null;
}
async function submitAdjust() {
    if (!_adjustProduct) return;
    const qty  = parseInt(document.getElementById('adjustQtyInput').value);
    const note = document.getElementById('adjustNoteInput').value.trim() || '盤點調整';
    if (isNaN(qty) || qty < 0) return alert('請輸入有效數量（0 以上）');
    setGas('loading');
    try {
        const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStock', data: { id: _adjustProduct.id, store: currentStore, qty, note } }) });
        const result = await res.json();
        if (result.success) {
            const p = rawProducts.find(x => Number(x.id) === Number(_adjustProduct.id));
            if (p) { if (currentStore !== '台南FOCUS') p.stockKH = qty; else p.stockTN = qty; }
            setGas('ok');
            showToast(`✅ ${_adjustProduct.name} 庫存 → ${qty} 枝`);
            closeAdjustModal();
            renderStockList();
        } else { setGas('error'); alert('調整失敗：' + (result.error || '')); }
    } catch(e) { setGas('error'); alert('連線失敗'); }
}

// ══ Tab 2: 進貨入庫 ══
// ── 進貨選品 Tab 切換 ──
function setPickerTab(tab) {
    _pickerTab = tab;
    const isP = tab === 'products';
    document.getElementById('productsPickerTab').classList.toggle('hidden', !isP);
    document.getElementById('libraryPickerTab').classList.toggle('hidden', isP);
    document.getElementById('ptab-products').className = `flex-1 text-xs py-2 rounded-lg transition ${isP ? 'bg-white font-bold shadow-sm text-[#6d7756]' : 'text-gray-400'}`;
    document.getElementById('ptab-library').className  = `flex-1 text-xs py-2 rounded-lg transition ${!isP ? 'bg-white font-bold shadow-sm text-[#6d7756]' : 'text-gray-400'}`;
    if (!isP && _flowerLibrary.length === 0) loadFlowerLibrary();
}

// ── 花材資料庫 — 多選模式 ──
let _librarySelected = new Map(); // name → category

async function loadFlowerLibrary() {
    const el = document.getElementById('libraryList');
    el.innerHTML = '<p class="text-center text-gray-300 text-xs py-8">載入花材資料庫...</p>';
    try {
        const res = await fetch(`${API_URL}?action=getFlowerLibrary`);
        _flowerLibrary = await res.json();
        if (!Array.isArray(_flowerLibrary)) _flowerLibrary = [];
        renderLibraryList();
    } catch(e) {
        el.innerHTML = '<p class="text-center text-red-300 text-xs py-8">載入失敗，請確認 API 設定</p>';
    }
}

function toggleLibraryItem(name, category) {
    if (_librarySelected.has(name)) _librarySelected.delete(name);
    else _librarySelected.set(name, category);
    updateLibrarySelBanner();
    renderLibraryList();
}

function updateLibrarySelBanner() {
    const n = _librarySelected.size;
    const banner = document.getElementById('librarySelBanner');
    document.getElementById('librarySelCount').innerText = n;
    banner.classList.toggle('hidden', n === 0);
}

function clearLibrarySelection() {
    _librarySelected.clear();
    updateLibrarySelBanner();
    renderLibraryList();
}

function renderLibraryList() {
    const kw  = (document.getElementById('librarySearch')?.value || '').trim().toLowerCase();
    const el  = document.getElementById('libraryList');
    let items = _flowerLibrary;
    if (kw) items = items.filter(x => x.name.toLowerCase().includes(kw) || (x.category||'').toLowerCase().includes(kw));

    if (!items.length) {
        el.innerHTML = '<p class="text-center text-gray-300 text-xs py-8">查無花材</p>';
        return;
    }

    const catMap = {};
    items.forEach(x => {
        const c = x.category || '其他';
        if (!catMap[c]) catMap[c] = [];
        catMap[c].push(x.name);
    });

    el.innerHTML = Object.entries(catMap).map(([cat, names]) => `
        <div class="cat-header">${cat}</div>
        ${names.map(name => {
            const sel = _librarySelected.has(name);
            const exists = rawProducts.find(p => p.name === name);
            return `<div class="inv-row" onclick="toggleLibraryItem(${JSON.stringify(name)}, ${JSON.stringify(cat)})"
                style="cursor:pointer;background:${sel ? '#f1f3eb' : 'white'};border-left:3px solid ${sel ? '#8e9775' : 'transparent'};padding-left:10px;">
                <div style="margin-right:10px;font-size:18px;color:${sel?'#8e9775':'#d1d5db'};">
                    ${sel ? '✓' : '○'}
                </div>
                <div style="flex:1;">
                    <span style="font-size:13px;font-weight:${sel?'bold':'normal'};">${name}</span>
                    ${exists ? `<span class="stock-badge stock-ok" style="margin-left:6px;">已在商品庫</span>` : ''}
                </div>
            </div>`;
        }).join('')}
    `).join('');
}

// ── 本週進花精靈 ──
function openWeeklyImport() {
    if (_librarySelected.size === 0) return;
    const modal = document.getElementById('weeklyImportModal');
    const rows  = document.getElementById('weeklyImportRows');

    rows.innerHTML = [..._librarySelected.entries()].map(([name, cat]) => {
        return `<div class="weekly-row grid items-center gap-1" data-name="${name}" data-cat="${cat}"
            style="grid-template-columns:1fr 56px 36px 48px 36px 36px 36px;border-bottom:1px solid #f3f4f6;padding-bottom:6px;">
            <div style="font-size:12px;font-weight:bold;color:#4a4a4a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</div>
            <input type="number" class="bundle-input border border-gray-200 rounded-lg px-1 py-1 text-xs text-center outline-none focus:border-[#8e9775] w-full"
                placeholder="NT$" min="0"
                oninput="updateRowCalc(this)">
            <input type="number" class="stems-input border border-gray-200 rounded-lg px-1 py-1 text-xs text-center outline-none focus:border-[#8e9775] w-full"
                placeholder="枝" min="1" value="10"
                oninput="updateRowCalc(this)">
            <div class="price-display text-xs text-center text-[#8e9775] font-bold">—</div>
            <input type="number" class="qty-kh border border-gray-200 rounded-lg px-1 py-1 text-xs text-center outline-none focus:border-[#8e9775] w-full" placeholder="0" min="0" oninput="updateWeeklyHint()">
            <input type="number" class="qty-tn border border-gray-200 rounded-lg px-1 py-1 text-xs text-center outline-none focus:border-[#8e9775] w-full" placeholder="0" min="0" oninput="updateWeeklyHint()">
            <input type="number" class="qty-es border border-gray-200 rounded-lg px-1 py-1 text-xs text-center outline-none focus:border-[#8e9775] w-full" placeholder="0" min="0" oninput="updateWeeklyHint()">
        </div>`;
    }).join('');

    updateWeeklyHint();
    modal.classList.remove('hidden');
}

function updateRowCalc(el) {
    const row    = el.closest('.weekly-row');
    const bundle = parseFloat(row.querySelector('.bundle-input').value) || 0;
    const stems  = parseFloat(row.querySelector('.stems-input').value) || 1;
    const cost   = bundle > 0 ? bundle / stems : 0;
    const price  = cost > 0 ? Math.round(cost * 4) : 0;
    row.querySelector('.price-display').innerText = price > 0 ? `NT$ ${price}` : '—';
    updateWeeklyHint();
}

function applyBulkCost() {
    const bulkBundle = parseFloat(document.getElementById('bulkCostInput').value) || 0;
    const bulkStems  = parseFloat(document.getElementById('bulkStemsInput').value) || 0;
    if (!bulkBundle && !bulkStems) return;
    document.querySelectorAll('.weekly-row').forEach(row => {
        if (bulkBundle) row.querySelector('.bundle-input').value = bulkBundle;
        if (bulkStems)  row.querySelector('.stems-input').value  = bulkStems;
        updateRowCalc(row.querySelector('.bundle-input'));
    });
}

function updateWeeklyHint() {
    let total = 0;
    document.querySelectorAll('.weekly-row').forEach(row => {
        const qty = (parseInt(row.querySelector('.qty-kh').value)||0)
                  + (parseInt(row.querySelector('.qty-tn').value)||0)
                  + (parseInt(row.querySelector('.qty-es').value)||0);
        total += qty;
    });
    document.getElementById('weeklyImportHint').innerText = total > 0 ? `合計 ${total} 枝` : '';
}

function closeWeeklyImport() {
    document.getElementById('weeklyImportModal').classList.add('hidden');
}

async function submitWeeklyImport() {
    const rows = [...document.querySelectorAll('.weekly-row')];
    const items = rows.map(row => {
        const bundle = parseFloat(row.querySelector('.bundle-input').value) || 0;
        const stems  = parseFloat(row.querySelector('.stems-input').value) || 1;
        const cost   = bundle > 0 ? Math.round((bundle / stems) * 10) / 10 : 0;
        return {
            name    : row.dataset.name,
            category: row.dataset.cat,
            cost,
            qtyKH   : parseInt(row.querySelector('.qty-kh').value) || 0,
            qtyTN   : parseInt(row.querySelector('.qty-tn').value) || 0,
            qtyES   : parseInt(row.querySelector('.qty-es').value) || 0,
        };
    }).filter(x => x.qtyKH + x.qtyTN + x.qtyES > 0);

    if (!items.length) return alert('至少一種花材需填入進貨數量');

    const btn = document.getElementById('weeklyImportBtn');
    btn.disabled = true; btn.innerText = `入庫中 (0/${items.length})...`;
    setGas('loading');

    let done = 0;
    for (const item of items) {
        // 確認商品存在（不存在則建立）
        let prod = rawProducts.find(p => p.name === item.name);
        if (!prod) {
            const price = Math.round(item.cost * 4);
            try {
                const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'addProduct', data:{ name:item.name, category:item.category, price, cost:item.cost, stockKH:0, stockTN:0, stockES:0 } }) });
                const res = await r.json();
                if (res.success) {
                    prod = { id: res.id, name: item.name, category: item.category, price, cost: item.cost, stockKH:0, stockTN:0, stockES:0 };
                    rawProducts.push(prod);
                }
            } catch(e) { continue; }
        }
        if (!prod) continue;

        // 進貨各店
        const stores = [
            { store:'高雄FOCUS 13', qty:item.qtyKH, key:'stockKH' },
            { store:'台南FOCUS',    qty:item.qtyTN, key:'stockTN' },
            { store:'誠品生活台南', qty:item.qtyES, key:'stockES' },
        ].filter(s => s.qty > 0);

        for (const s of stores) {
            try {
                const r = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'receiveStock', data:{ id:prod.id, store:s.store, qty:s.qty, unitCost:item.cost, note:'本週進花' } }) });
                const res = await r.json();
                if (res.success && prod) prod[s.key] = res.newStock;
            } catch(e) {}
        }

        // 更新進價與售價
        if (item.cost > 0) {
            const price = Math.round(item.cost * 4);
            fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateProduct', data:{ id:prod.id, cost:item.cost, price } }) }).catch(()=>{});
            if (prod) { prod.cost = item.cost; prod.price = Math.round(item.cost*4); }
        }

        done++;
        btn.innerText = `入庫中 (${done}/${items.length})...`;
    }

    setGas('ok');
    showToast(`✅ 本週進花完成：${done} 種花材已入庫`, 3500);
    closeWeeklyImport();
    clearLibrarySelection();
    renderReceiveList();
    btn.disabled = false; btn.innerText = '✅ 全部入庫';
}

function renderReceiveList() {
    const keyword = (document.getElementById('receiveSearch').value || '').trim().toLowerCase();
    const isKH    = currentStore !== '台南FOCUS';
    const catMap  = {};

    rawProducts.forEach(p => {
        if (keyword && !p.name.toLowerCase().includes(keyword)) return;
        const cat = p.category || '其他加購';
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(p);
    });

    const cats = Object.keys(catMap).sort((a,b) => {
        const ai = CAT_ORDER.indexOf(a); const bi = CAT_ORDER.indexOf(b);
        return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    if (!cats.length) {
        document.getElementById('receiveProductList').innerHTML = '<p class="text-center text-gray-300 text-xs py-8">查無品項</p>';
        return;
    }

    document.getElementById('receiveProductList').innerHTML = cats.map(cat => `
        <div class="cat-header">${cat}</div>
        ${catMap[cat].map(p => {
            const stock = getStoreStock(p);
            const badge = stock > 5 ? 'stock-ok' : stock > 0 ? 'stock-low' : 'stock-zero';
            return `<div class="inv-row">
                <div style="flex:1;">
                    <span style="font-size:13px;font-weight:bold;">${p.name}</span>
                    <span class="stock-badge ${badge}" style="margin-left:8px;">${stock} 枝</span>
                </div>
                <button onclick="selectReceiveProduct(${p.id})" style="background:#c4a882;color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:bold;font-family:'Noto Serif TC',serif;">選擇</button>
            </div>`;
        }).join('')}`).join('');
}

function selectReceiveProduct(id) {
    const p = rawProducts.find(x => Number(x.id) === Number(id));
    if (!p) return;
    _selectedProduct = p;
    // 更新三店庫存快覽
    document.getElementById('selectedProductName').innerText = p.name;
    document.getElementById('rStock-kh').innerText = `${Number(p.stockKH)||0} 枝`;
    document.getElementById('rStock-tn').innerText = `${Number(p.stockTN)||0} 枝`;
    document.getElementById('rStock-es').innerText = `${Number(p.stockES)||0} 枝`;
    document.getElementById('selectedProductArea').classList.remove('hidden');
    document.getElementById('receiveProductPicker').classList.add('hidden');
    document.getElementById('receiveForm').classList.remove('hidden');
    document.getElementById('receiveQtyKH').value = '';
    document.getElementById('receiveQtyTN').value = '';
    document.getElementById('receiveQtyES').value = '';
    document.getElementById('receiveNote').value = '';
    setupQtyListeners();
    setTimeout(() => document.getElementById('receiveQtyKH').focus(), 100);
}


function setupQtyListeners() {
    ['receiveQtyKH','receiveQtyTN','receiveQtyES'].forEach(id => {
        const el = document.getElementById(id);
        el.oninput = () => {
            const total = (parseInt(document.getElementById('receiveQtyKH').value)||0)
                        + (parseInt(document.getElementById('receiveQtyTN').value)||0)
                        + (parseInt(document.getElementById('receiveQtyES').value)||0);
            document.getElementById('receiveTotalHint').innerText = `合計：${total} 枝`;
        };
    });
}

function clearSelectedProduct() {
    _selectedProduct = null;
    document.getElementById('selectedProductArea').classList.add('hidden');
    document.getElementById('receiveProductPicker').classList.remove('hidden');
    document.getElementById('receiveForm').classList.add('hidden');
    document.getElementById('receiveSearch').value = '';
    renderReceiveList();
}

async function submitReceive() {
    if (!_selectedProduct) return alert('請先選擇品項');
    const unitCost = 0; // 定價在商品管理頁設定
    const qtyKH   = parseInt(document.getElementById('receiveQtyKH').value) || 0;
    const qtyTN   = parseInt(document.getElementById('receiveQtyTN').value) || 0;
    const qtyES   = parseInt(document.getElementById('receiveQtyES').value) || 0;
    const note    = document.getElementById('receiveNote').value.trim() || '進貨入庫';
    const total   = qtyKH + qtyTN + qtyES;
    if (total <= 0) return alert('至少一個據點需填入進貨數量');

    const btn = document.getElementById('receiveSubmitBtn');
    btn.disabled = true; btn.innerText = '入庫中...';
    setGas('loading');

    const stores = [
        { store: '高雄FOCUS 13', qty: qtyKH, key: 'stockKH' },
        { store: '台南FOCUS',    qty: qtyTN, key: 'stockTN' },
        { store: '誠品生活台南', qty: qtyES, key: 'stockES' },
    ].filter(s => s.qty > 0);

    // 依序送出（避免 GAS 並發衝突）
    let successCount = 0;
    const p = rawProducts.find(x => Number(x.id) === Number(_selectedProduct.id));
    for (const s of stores) {
        try {
            const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'receiveStock', data: { id: _selectedProduct.id, store: s.store, qty: s.qty, unitCost, note } }) });
            const result = await res.json();
            if (result.success) {
                successCount++;
                if (p) p[s.key] = result.newStock;
                // 更新三店快覽
                const idMap = { stockKH:'rStock-kh', stockTN:'rStock-tn', stockES:'rStock-es' };
                const el = document.getElementById(idMap[s.key]);
                if (el) el.innerText = `${result.newStock} 枝`;
            }
        } catch(e) { /* 繼續其他店 */ }
    }

    // 更新售價
    if (unitCost > 0 && p) {
        p.cost  = unitCost;
        p.price = unitCost * 4;
        // 同步更新 GAS 商品售價
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProduct', data: { id: _selectedProduct.id, cost: unitCost, price: unitCost * 4 } }) }).catch(()=>{});
    }

    setGas(successCount === stores.length ? 'ok' : 'error');
    showToast(`✅ 入庫完成：共 ${total} 枝 分配至 ${successCount} 間店`, 3000);
    document.getElementById('receiveQtyKH').value = '';
    document.getElementById('receiveQtyTN').value = '';
    document.getElementById('receiveQtyES').value = '';
    document.getElementById('receiveNote').value  = '';
    document.getElementById('receiveTotalHint').innerText = '合計：0 枝';
    btn.disabled = false; btn.innerText = '✅ 僅此項入庫';
}

// ── 批次進貨 ──
function addToBatch() {
    if (!_selectedProduct) return alert('請先選擇品項');
    const unitCost = 0; // 定價在商品管理頁設定
    const qtyKH   = parseInt(document.getElementById('receiveQtyKH').value) || 0;
    const qtyTN   = parseInt(document.getElementById('receiveQtyTN').value) || 0;
    const qtyES   = parseInt(document.getElementById('receiveQtyES').value) || 0;
    const note    = document.getElementById('receiveNote').value.trim() || '進貨入庫';
    if (qtyKH + qtyTN + qtyES <= 0) return alert('至少一個據點需填入進貨數量');

    const addedName = _selectedProduct ? _selectedProduct.name : '';
    _batchItems.push({ product: _selectedProduct, unitCost, qtyKH, qtyTN, qtyES, note });
    renderBatchList();

    // 清空欄位，回到選品
    document.getElementById('receiveQtyKH').value = '';
    document.getElementById('receiveQtyTN').value = '';
    document.getElementById('receiveQtyES').value = '';
    document.getElementById('receiveNote').value  = '';
    document.getElementById('receiveTotalHint').innerText = '合計：0 枝';
    clearSelectedProduct();
    // 若花材資料庫 tab 開著，刷新 badge 狀態
    if (_pickerTab === 'library') renderLibraryList();
    showToast(`✅ 已加入：${addedName}`);
}

function renderBatchList() {
    const panel = document.getElementById('batchPanel');
    const list  = document.getElementById('batchList');
    if (!_batchItems.length) { panel.classList.add('hidden'); return; }
    panel.classList.remove('hidden');
    list.innerHTML = _batchItems.map((item, i) => {
        const parts = [];
        if (item.qtyKH > 0) parts.push(`高雄×${item.qtyKH}`);
        if (item.qtyTN > 0) parts.push(`台南×${item.qtyTN}`);
        if (item.qtyES > 0) parts.push(`誠品×${item.qtyES}`);
        return `<div style="background:#fafaf9;border:1px solid #e5e7eb;border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">
            <div>
                <span style="font-weight:bold;font-size:13px;">${item.product.name}</span>
                <span style="font-size:11px;color:#9ca3af;margin-left:8px;">${parts.join(' · ')}</span>
            </div>
            <button onclick="removeBatchItem(${i})" style="color:#f87171;background:none;border:none;font-size:18px;cursor:pointer;line-height:1;">×</button>
        </div>`;
    }).join('');
}

function removeBatchItem(i) {
    _batchItems.splice(i, 1);
    renderBatchList();
}

async function submitBatch() {
    if (!_batchItems.length) return;
    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = true; btn.innerText = '送出中...';
    setGas('loading');

    let totalOk = 0;
    for (const item of _batchItems) {
        const stores = [
            { store: '高雄FOCUS 13', qty: item.qtyKH, key: 'stockKH' },
            { store: '台南FOCUS',    qty: item.qtyTN, key: 'stockTN' },
            { store: '誠品生活台南', qty: item.qtyES, key: 'stockES' },
        ].filter(s => s.qty > 0);

        let ok = true;
        for (const s of stores) {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'receiveStock', data: { id: item.product.id, store: s.store, qty: s.qty, unitCost: item.unitCost, note: item.note } }) });
                const r   = await res.json();
                if (r.success) {
                    const p = rawProducts.find(x => Number(x.id) === Number(item.product.id));
                    if (p) p[s.key] = r.newStock;
                }
            } catch(e) { ok = false; }
        }
        // 更新售價
        if (item.unitCost > 0) {
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProduct', data: { id: item.product.id, cost: item.unitCost, price: item.unitCost * 4 } }) }).catch(()=>{});
            const p = rawProducts.find(x => Number(x.id) === Number(item.product.id));
            if (p) { p.cost = item.unitCost; p.price = item.unitCost * 4; }
        }
        if (ok) totalOk++;
    }

    setGas(totalOk === _batchItems.length ? 'ok' : 'error');
    showToast(`✅ 批次入庫完成：${totalOk}/${_batchItems.length} 種花材`, 3000);
    _batchItems = [];
    renderBatchList();
    btn.disabled = false; btn.innerText = '全部送出';
}

// ══ Tab 3: 盤點記錄 ══
async function loadHistoryLog() {
    const el = document.getElementById('statusList');
    el.innerHTML = '<p class="text-center text-gray-300 text-xs py-12">載入中...</p>';
    setGas('loading');
    try {
        const res  = await fetch(`${API_URL}?action=getInventoryLog&store=${encodeURIComponent(currentStore)}`);
        const data = await res.json();
        setGas('ok');

        if (!Array.isArray(data) || data.length === 0) {
            el.innerHTML = '<p class="text-center text-gray-300 text-xs py-12">尚無盤點記錄</p>';
            return;
        }

        el.innerHTML = data.map(row => {
            const diffColor = row.diff > 0 ? '#16a34a' : row.diff < 0 ? '#dc2626' : '#9ca3af';
            const diffStr   = row.diff > 0 ? `+${row.diff}` : String(row.diff);
            return `<div class="inv-row">
                <div style="flex:1;">
                    <div style="font-size:13px;font-weight:bold;">${row.name}</div>
                    <div style="font-size:10px;color:#9ca3af;margin-top:2px;">${row.time} · ${row.note || '盤點調整'}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:12px;color:#9ca3af;">${row.oldQty} → ${row.newQty}</div>
                    <div style="font-size:13px;font-weight:bold;color:${diffColor};">${diffStr} 枝</div>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        setGas('error');
        el.innerHTML = '<p class="text-center text-red-300 text-xs py-12">載入失敗，請確認 GAS 已更新</p>';
    }
}

// ── 工具 ──
function goToPOS() {
    // 取當前路徑的目錄，換成 pos.html
    const base = window.location.href.replace(/\/[^\/]*$/, '');
    window.location.href = base + '/pos.html';
}
function setGas(state) { document.getElementById('gasDot').className = 'gas-dot ' + state; }
function showToast(msg, duration = 2000) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
