<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        * { font-family: 'Noto Serif TC', serif; }
        body { background: #fcfbf9; color: #4a4a4a; }
        .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #e5e7eb; background: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { border-color: #8e9775; background: #f1f3eb; color: #6d7756; font-weight: bold; }
        .inv-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 10px; background: #fafaf9; border: 1px solid #f3f4f6; margin-bottom: 6px; }
        .stock-badge { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 12px; }
        .stock-ok   { background: #dcfce7; color: #16a34a; }
        .stock-low  { background: #fef9c3; color: #ca8a04; }
        .stock-zero { background: #fee2e2; color: #dc2626; }
        .s-input { width: 100%; border: 2px solid #e8ddd0; border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; background: white; transition: border-color 0.2s; }
        .s-input:focus { border-color: #8e9775; }
        .btn-primary { background: #8e9775; color: white; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s; font-family: 'Noto Serif TC', serif; }
        .btn-primary:active { opacity: 0.8; }
        .gas-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #9ca3af; }
        .gas-dot.ok      { background: #22c55e; }
        .gas-dot.loading { background: #f59e0b; animation: blink 0.8s infinite; }
        .gas-dot.error   { background: #ef4444; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2e2926; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 500; opacity: 0; transition: all 0.25s ease; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-header { font-size: 10px; font-weight: bold; color: #9ca3af; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 14px 4px; }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- Header -->

<div class="bg-white border-b-2 border-[#8e9775] px-4 py-3 flex justify-between items-center sticky top-0 z-40 shadow-sm">
    <div>
        <h1 class="text-base font-bold text-[#8e9775]">📦 拾逅花事 | 盤點系統</h1>
        <p id="statusInfo" class="text-[10px] text-gray-400 italic">連接中...</p>
    </div>
    <div class="flex items-center gap-2">
        <span class="gas-dot" id="gasDot"></span>
        <div class="flex gap-1">
            <button onclick="setStore('高雄FOCUS 13')" id="btn-kh" class="tab-btn active" style="padding:6px 14px;font-size:12px;">高雄</button>
            <button onclick="setStore('台南FOCUS')"    id="btn-tn" class="tab-btn"        style="padding:6px 14px;font-size:12px;">台南</button>
        </div>
        <nav class="flex gap-1">
            <a href="index.html"    class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">POS</a>
            <a href="products.html" class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">商品</a>
            <a href="dashboard.html" class="text-[10px] text-gray-300 border border-gray-200 px-2 py-1 rounded-full">後台</a>
        </nav>
    </div>
</div>

<!-- 分頁切換 -->

<div class="p-4 pb-0 flex gap-3 overflow-x-auto no-scrollbar">
    <button onclick="switchTab('stock')"   id="tab-stock"   class="tab-btn active flex-shrink-0">📋 庫存盤點</button>
    <button onclick="switchTab('receive')" id="tab-receive" class="tab-btn flex-shrink-0">📥 進貨入庫</button>
    <button onclick="switchTab('status')"  id="tab-status"  class="tab-btn flex-shrink-0">📜 盤點記錄</button>
</div>

<!-- ══ Tab 1: 庫存盤點 ══ -->

<div id="tab-stock-view" class="p-4">
    <div class="flex gap-2 mb-4">
        <input type="text" id="stockSearch" placeholder="搜尋品項..." oninput="renderStockList()"
            class="flex-1 border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:border-[#8e9775]">
        <button onclick="refreshProducts()" class="border border-gray-200 rounded-xl px-3 py-2 text-xs text-gray-400">🔄</button>
    </div>
    <div id="stockList">
        <p class="text-center text-gray-300 text-xs py-12">載入中...</p>
    </div>
</div>

<!-- ══ Tab 2: 進貨入庫 ══ -->

<div id="tab-receive-view" class="p-4 hidden">

    <!-- 已選品項資訊列 -->
    <div id="selectedProductArea" class="hidden bg-[#f1f3eb] border border-[#8e9775] rounded-xl p-4 mb-4">
        <div class="flex justify-between items-center mb-2">
            <span id="selectedProductName" class="font-bold text-sm text-[#6d7756]"></span>
            <button onclick="clearSelectedProduct()" class="text-[10px] text-red-400 border border-red-200 px-2 py-1 rounded-full">取消</button>
        </div>
        <!-- 三店庫存快覽 -->
        <div class="grid grid-cols-3 gap-2 text-center text-xs">
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">高雄</div>
                <div class="font-bold text-[#8e9775]" id="rStock-kh">—</div>
            </div>
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">台南</div>
                <div class="font-bold text-[#8e9775]" id="rStock-tn">—</div>
            </div>
            <div class="bg-white rounded-lg py-2">
                <div class="text-gray-400 mb-0.5">誠品</div>
                <div class="font-bold text-[#8e9775]" id="rStock-es">—</div>
            </div>
        </div>
    </div>

    <!-- 品項搜尋列表 -->
    <div id="receiveProductPicker">
        <div class="flex gap-2 mb-3">
            <input type="text" id="receiveSearch" placeholder="搜尋品項..." oninput="renderReceiveList()"
                class="flex-1 border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:border-[#8e9775]">
        </div>
        <div id="receiveProductList">
            <p class="text-center text-gray-300 text-xs py-8">載入中...</p>
        </div>
    </div>

    <!-- 進貨表單：多店分配 -->
    <div id="receiveForm" class="hidden bg-white rounded-2xl border border-gray-100 p-5 space-y-4">

        <!-- 進價 & 自動售價 -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">單支進價 *</label>
                <input type="number" id="receiveUnitCost" placeholder="NT$" min="0" step="1"
                    oninput="updateAutoPrice()" class="s-input">
            </div>
            <div>
                <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">建議售價（×4）</label>
                <div id="autoPriceDisplay" class="s-input bg-gray-50 text-[#8e9775] font-bold" style="border-style:dashed;">—</div>
            </div>
        </div>

        <!-- 三店進貨分配 -->
        <div>
            <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">各店進貨數量（枝）</label>
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">高雄</div>
                    <input type="number" id="receiveQtyKH" placeholder="0" min="0" class="s-input text-center">
                </div>
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">台南</div>
                    <input type="number" id="receiveQtyTN" placeholder="0" min="0" class="s-input text-center">
                </div>
                <div>
                    <div class="text-[10px] text-center text-gray-400 mb-1">誠品</div>
                    <input type="number" id="receiveQtyES" placeholder="0" min="0" class="s-input text-center">
                </div>
            </div>
            <div id="receiveTotalHint" class="text-center text-xs text-gray-400 mt-2">合計：0 枝</div>
        </div>

        <div>
            <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">備註（選填）</label>
            <input type="text" id="receiveNote" placeholder="進貨廠商、批次..." class="s-input">
        </div>
        <button onclick="submitReceive()" class="btn-primary" id="receiveSubmitBtn">✅ 確認入庫</button>
    </div>

</div>

<!-- ══ Tab 3: 庫存狀況 ══ -->

<div id="tab-status-view" class="p-4 hidden">
    <div id="statusList">
        <p class="text-center text-gray-300 text-xs py-12">載入中...</p>
    </div>
</div>

<!-- 盤點調整 Modal -->

<div id="adjustModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl p-6 w-full max-w-xs">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-base" id="adjustTitle">調整庫存</h3>
            <button onclick="closeAdjustModal()" class="text-gray-300 text-xl">✕</button>
        </div>
        <div class="text-xs text-gray-400 mb-3">
            目前庫存：<span id="adjustCurrentStock" class="font-bold text-[#8e9775]">—</span>
        </div>
        <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">調整後數量</label>
        <input type="number" id="adjustQtyInput" placeholder="輸入新的庫存數量" min="0" class="s-input mb-3">
        <label class="text-[10px] text-gray-400 font-bold tracking-widest uppercase block mb-2">調整原因（選填）</label>
        <input type="text" id="adjustNoteInput" placeholder="盤點調整、破損…" class="s-input mb-4">
        <button onclick="submitAdjust()" class="btn-primary">確認調整</button>
    </div>
</div>

<script>
const ADMIN_PASSWORD = '1234';
let API_URL          = localStorage.getItem('moment_flor_api') || '';
let currentStore     = '高雄FOCUS 13';
let rawProducts      = [];
let _adjustProduct   = null;
let _selectedProduct = null;
let _toastTimer;

// ── 直接初始化（不需要密碼）──
window.onload = () => {
    if (!API_URL) {
        API_URL = prompt('請輸入 API URL：') || '';
        if (API_URL) localStorage.setItem('moment_flor_api', API_URL);
    }
    init();
};

// ── 初始化 ──
async function init() {
    setGas('loading');
    try {
        const res = await fetch(`${API_URL}?action=getProducts`);
        rawProducts = await res.json();
        document.getElementById('statusInfo').innerText = `✅ 已載入 ${rawProducts.length} 項`;
        setGas('ok');
        renderStockList();
        renderReceiveList();
    } catch(e) {
        document.getElementById('statusInfo').innerText = '❌ API 連線錯誤';
        setGas('error');
    }
}

async function refreshProducts() {
    setGas('loading');
    try {
        const res = await fetch(`${API_URL}?action=getProducts`);
        rawProducts = await res.json();
        setGas('ok');
        renderStockList();
        renderReceiveList();
        showToast('✅ 資料已更新');
    } catch(e) { setGas('error'); showToast('❌ 更新失敗'); }
}

// ── 門市切換 ──
function setStore(store) {
    currentStore = store;
    document.getElementById('btn-kh').classList.toggle('active', store === '高雄FOCUS 13');
    document.getElementById('btn-tn').classList.toggle('active', store === '台南FOCUS');
    renderStockList();
    clearSelectedProduct();
    renderReceiveList();
}

// ── Tab 切換 ──
function switchTab(tab) {
    ['stock','receive','status'].forEach(t => {
        document.getElementById(`tab-${t}-view`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'status') loadHistoryLog();
}

// ══ Tab 1: 庫存盤點 ══
const CAT_ORDER = ['主花','配花','葉材','花束','花瓶','其他加購'];

function renderStockList() {
    const keyword = (document.getElementById('stockSearch').value || '').trim().toLowerCase();
    const isKH    = currentStore !== '台南FOCUS';
    const catMap  = {};

    rawProducts.forEach(p => {
        if (keyword && !p.name.toLowerCase().includes(keyword)) return;
        const cat = p.category || '其他加購';
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(p);
    });

    const cats = Object.keys(catMap).sort((a,b) => {
        const ai = CAT_ORDER.indexOf(a); const bi = CAT_ORDER.indexOf(b);
        return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    if (!cats.length) {
        document.getElementById('stockList').innerHTML = '<p class="text-center text-gray-300 text-xs py-12">查無品項</p>';
        return;
    }

    document.getElementById('stockList').innerHTML = cats.map(cat => `
        <div class="cat-header">${cat}</div>
        ${catMap[cat].map(p => {
            const stock = isKH ? p.stockKH : p.stockTN;
            const badge = stock > 5 ? 'stock-ok' : stock > 0 ? 'stock-low' : 'stock-zero';
            return `<div class="inv-row">
                <span style="font-size:13px;font-weight:bold;flex:1;">${p.name}</span>
                <span class="stock-badge ${badge}" style="margin-right:8px;">${stock} 枝</span>
                <button onclick="openReceiveFromList(${p.id})" style="background:#fdf1e4;border:1px solid #c4a882;border-radius:8px;padding:5px 10px;font-size:11px;color:#8a5a2a;cursor:pointer;margin-right:5px;font-family:'Noto Serif TC',serif;">進貨</button>
                <button onclick="openAdjustModal(${p.id})" style="background:#f1f3eb;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#6d7756;cursor:pointer;font-weight:bold;font-family:'Noto Serif TC',serif;">調整</button>
            </div>`;
        }).join('')}`).join('');
}

// 從庫存列表點進貨 → 切換到進貨頁並預選品項
function openReceiveFromList(id) {
    switchTab('receive');
    selectReceiveProduct(id);
}

// ── 調整 Modal ──
function openAdjustModal(id) {
    const p = rawProducts.find(x => Number(x.id) === Number(id));
    if (!p) return;
    _adjustProduct = p;
    const stock = currentStore !== '台南FOCUS' ? p.stockKH : p.stockTN;
    document.getElementById('adjustTitle').innerText = `調整：${p.name}`;
    document.getElementById('adjustCurrentStock').innerText = `${stock} 枝`;
    document.getElementById('adjustQtyInput').value = stock;
    document.getElementById('adjustNoteInput').value = '';
    document.getElementById('adjustModal').classList.remove('hidden');
    setTimeout(() => { const el = document.getElementById('adjustQtyInput'); el.focus(); el.select(); }, 100);
}
function closeAdjustModal() {
    document.getElementById('adjustModal').classList.add('hidden');
    _adjustProduct = null;
}
async function submitAdjust() {
    if (!_adjustProduct) return;
    const qty  = parseInt(document.getElementById('adjustQtyInput').value);
    const note = document.getElementById('adjustNoteInput').value.trim() || '盤點調整';
    if (isNaN(qty) || qty < 0) return alert('請輸入有效數量（0 以上）');
    setGas('loading');
    try {
        const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStock', data: { id: _adjustProduct.id, store: currentStore, qty, note } }) });
        const result = await res.json();
        if (result.success) {
            const p = rawProducts.find(x => Number(x.id) === Number(_adjustProduct.id));
            if (p) { if (currentStore !== '台南FOCUS') p.stockKH = qty; else p.stockTN = qty; }
            setGas('ok');
            showToast(`✅ ${_adjustProduct.name} 庫存 → ${qty} 枝`);
            closeAdjustModal();
            renderStockList();
        } else { setGas('error'); alert('調整失敗：' + (result.error || '')); }
    } catch(e) { setGas('error'); alert('連線失敗'); }
}

// ══ Tab 2: 進貨入庫 ══
function renderReceiveList() {
    const keyword = (document.getElementById('receiveSearch').value || '').trim().toLowerCase();
    const isKH    = currentStore !== '台南FOCUS';
    const catMap  = {};

    rawProducts.forEach(p => {
        if (keyword && !p.name.toLowerCase().includes(keyword)) return;
        const cat = p.category || '其他加購';
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(p);
    });

    const cats = Object.keys(catMap).sort((a,b) => {
        const ai = CAT_ORDER.indexOf(a); const bi = CAT_ORDER.indexOf(b);
        return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    if (!cats.length) {
        document.getElementById('receiveProductList').innerHTML = '<p class="text-center text-gray-300 text-xs py-8">查無品項</p>';
        return;
    }

    document.getElementById('receiveProductList').innerHTML = cats.map(cat => `
        <div class="cat-header">${cat}</div>
        ${catMap[cat].map(p => {
            const stock = isKH ? p.stockKH : p.stockTN;
            const badge = stock > 5 ? 'stock-ok' : stock > 0 ? 'stock-low' : 'stock-zero';
            return `<div class="inv-row">
                <div style="flex:1;">
                    <span style="font-size:13px;font-weight:bold;">${p.name}</span>
                    <span class="stock-badge ${badge}" style="margin-left:8px;">${stock} 枝</span>
                </div>
                <button onclick="selectReceiveProduct(${p.id})" style="background:#c4a882;color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:bold;font-family:'Noto Serif TC',serif;">選擇</button>
            </div>`;
        }).join('')}`).join('');
}

function selectReceiveProduct(id) {
    const p = rawProducts.find(x => Number(x.id) === Number(id));
    if (!p) return;
    _selectedProduct = p;
    // 更新三店庫存快覽
    document.getElementById('selectedProductName').innerText = p.name;
    document.getElementById('rStock-kh').innerText = `${Number(p.stockKH)||0} 枝`;
    document.getElementById('rStock-tn').innerText = `${Number(p.stockTN)||0} 枝`;
    document.getElementById('rStock-es').innerText = `${Number(p.stockES)||0} 枝`;
    document.getElementById('selectedProductArea').classList.remove('hidden');
    document.getElementById('receiveProductPicker').classList.add('hidden');
    document.getElementById('receiveForm').classList.remove('hidden');
    // 填入現有進價
    document.getElementById('receiveUnitCost').value = p.cost || '';
    document.getElementById('receiveQtyKH').value = '';
    document.getElementById('receiveQtyTN').value = '';
    document.getElementById('receiveQtyES').value = '';
    document.getElementById('receiveNote').value = '';
    updateAutoPrice();
    setupQtyListeners();
    setTimeout(() => document.getElementById('receiveUnitCost').focus(), 100);
}

function updateAutoPrice() {
    const cost = parseFloat(document.getElementById('receiveUnitCost').value) || 0;
    const auto = cost > 0 ? `NT$ ${cost * 4}` : '—';
    document.getElementById('autoPriceDisplay').innerText = auto;
}

function setupQtyListeners() {
    ['receiveQtyKH','receiveQtyTN','receiveQtyES'].forEach(id => {
        const el = document.getElementById(id);
        el.oninput = () => {
            const total = (parseInt(document.getElementById('receiveQtyKH').value)||0)
                        + (parseInt(document.getElementById('receiveQtyTN').value)||0)
                        + (parseInt(document.getElementById('receiveQtyES').value)||0);
            document.getElementById('receiveTotalHint').innerText = `合計：${total} 枝`;
        };
    });
}

function clearSelectedProduct() {
    _selectedProduct = null;
    document.getElementById('selectedProductArea').classList.add('hidden');
    document.getElementById('receiveProductPicker').classList.remove('hidden');
    document.getElementById('receiveForm').classList.add('hidden');
    document.getElementById('receiveSearch').value = '';
    renderReceiveList();
}

async function submitReceive() {
    if (!_selectedProduct) return alert('請先選擇品項');
    const unitCost = parseFloat(document.getElementById('receiveUnitCost').value) || 0;
    const qtyKH   = parseInt(document.getElementById('receiveQtyKH').value) || 0;
    const qtyTN   = parseInt(document.getElementById('receiveQtyTN').value) || 0;
    const qtyES   = parseInt(document.getElementById('receiveQtyES').value) || 0;
    const note    = document.getElementById('receiveNote').value.trim() || '進貨入庫';
    const total   = qtyKH + qtyTN + qtyES;
    if (total <= 0) return alert('至少一個據點需填入進貨數量');

    const btn = document.getElementById('receiveSubmitBtn');
    btn.disabled = true; btn.innerText = '入庫中...';
    setGas('loading');

    const stores = [
        { store: '高雄FOCUS 13', qty: qtyKH, key: 'stockKH' },
        { store: '台南FOCUS',    qty: qtyTN, key: 'stockTN' },
        { store: '誠品生活台南', qty: qtyES, key: 'stockES' },
    ].filter(s => s.qty > 0);

    // 依序送出（避免 GAS 並發衝突）
    let successCount = 0;
    const p = rawProducts.find(x => Number(x.id) === Number(_selectedProduct.id));
    for (const s of stores) {
        try {
            const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'receiveStock', data: { id: _selectedProduct.id, store: s.store, qty: s.qty, unitCost, note } }) });
            const result = await res.json();
            if (result.success) {
                successCount++;
                if (p) p[s.key] = result.newStock;
                // 更新三店快覽
                const idMap = { stockKH:'rStock-kh', stockTN:'rStock-tn', stockES:'rStock-es' };
                const el = document.getElementById(idMap[s.key]);
                if (el) el.innerText = `${result.newStock} 枝`;
            }
        } catch(e) { /* 繼續其他店 */ }
    }

    // 更新售價
    if (unitCost > 0 && p) {
        p.cost  = unitCost;
        p.price = unitCost * 4;
        // 同步更新 GAS 商品售價
        fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateProduct', data: { id: _selectedProduct.id, cost: unitCost, price: unitCost * 4 } }) }).catch(()=>{});
    }

    setGas(successCount === stores.length ? 'ok' : 'error');
    showToast(`✅ 入庫完成：共 ${total} 枝 分配至 ${successCount} 間店`, 3000);
    document.getElementById('receiveQtyKH').value = '';
    document.getElementById('receiveQtyTN').value = '';
    document.getElementById('receiveQtyES').value = '';
    document.getElementById('receiveNote').value  = '';
    document.getElementById('receiveTotalHint').innerText = '合計：0 枝';
    btn.disabled = false; btn.innerText = '✅ 確認入庫';
}

// ══ Tab 3: 盤點記錄 ══
async function loadHistoryLog() {
    const el = document.getElementById('statusList');
    el.innerHTML = '<p class="text-center text-gray-300 text-xs py-12">載入中...</p>';
    setGas('loading');
    try {
        const res  = await fetch(`${API_URL}?action=getInventoryLog&store=${encodeURIComponent(currentStore)}`);
        const data = await res.json();
        setGas('ok');

        if (!Array.isArray(data) || data.length === 0) {
            el.innerHTML = '<p class="text-center text-gray-300 text-xs py-12">尚無盤點記錄</p>';
            return;
        }

        el.innerHTML = data.map(row => {
            const diffColor = row.diff > 0 ? '#16a34a' : row.diff < 0 ? '#dc2626' : '#9ca3af';
            const diffStr   = row.diff > 0 ? `+${row.diff}` : String(row.diff);
            return `<div class="inv-row">
                <div style="flex:1;">
                    <div style="font-size:13px;font-weight:bold;">${row.name}</div>
                    <div style="font-size:10px;color:#9ca3af;margin-top:2px;">${row.time} · ${row.note || '盤點調整'}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:12px;color:#9ca3af;">${row.oldQty} → ${row.newQty}</div>
                    <div style="font-size:13px;font-weight:bold;color:${diffColor};">${diffStr} 枝</div>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        setGas('error');
        el.innerHTML = '<p class="text-center text-red-300 text-xs py-12">載入失敗，請確認 GAS 已更新</p>';
    }
}

// ── 工具 ──
function goToPOS() {
    // 取當前路徑的目錄，換成 pos.html
    const base = window.location.href.replace(/\/[^\/]*$/, '');
    window.location.href = base + '/pos.html';
}
function setGas(state) { document.getElementById('gasDot').className = 'gas-dot ' + state; }
function showToast(msg, duration = 2000) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
</script>
