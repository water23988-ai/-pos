<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾逅花事 | 庫存管理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { font-family: 'Noto Sans TC', -apple-system, sans-serif; box-sizing: border-box; }
        body { background: #F0E9DF; color: #3D2E1E; overflow-x: hidden; -webkit-font-smoothing: antialiased; margin: 0; }

        /* ── 側邊欄 ── */
        .side-nav { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #E5D2B8; border-right: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; z-index: 200; box-shadow: 2px 0 12px rgba(0,0,0,0.06); }
        .nav-brand { padding: 22px 18px 18px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; gap: 10px; }
        .nav-brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #8e9775, #6d7756); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-brand-name { font-size: 14px; font-weight: 800; color: #3d2e1e; }
        .nav-brand-sub { font-size: 10px; color: #a08060; margin-top: 2px; }
        .nav-section-label { font-size: 9px; font-weight: 700; color: #b8976a; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 18px 6px; }
        .nav-items { flex: 1; padding: 10px 8px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #7a5c3a; font-size: 13px; font-weight: 500; text-decoration: none; border-radius: 10px; margin-bottom: 2px; transition: all 0.15s; }
        .nav-item:hover { background: rgba(0,0,0,0.05); color: #3d2e1e; }
        .nav-item.active { background: rgba(109,119,86,0.15); color: #4d3520; font-weight: 700; }
        .nav-icon { font-size: 17px; flex-shrink: 0; }
        .nav-bottom { padding: 12px 8px 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .gas-status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; background: rgba(0,0,0,0.06); font-size: 11px; color: #a08060; }
        .gas-status-bar button { background: rgba(0,0,0,0.06); border: none; border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; margin-left: auto; }

        /* ── 主內容 ── */
        .main-area { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
        .main-header { background: #FAF7F2; border-bottom: 1px solid #DDD0BC; padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .main-header-title { font-size: 16px; font-weight: 800; color: #3D2E1E; }
        .main-content { padding: 20px; }

        /* ── 通用 ── */
        .f-input { border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 10px 13px; font-size: 14px; outline: none; background: #F5EFE6; color: #3D2E1E; transition: all 0.15s; }
        .f-input:focus { border-color: #8e9775; background: #FAF7F2; }
        .btn-primary { background: #8e9775; color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: #F5EFE6; color: #7A6550; border: 1.5px solid #DDD0BC; border-radius: 10px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-secondary:hover { background: #EDE5D8; }
        .chip { border: 1.5px solid #DDD0BC; background: #FAF7F2; border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 500; color: #7A6550; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .chip.active { border-color: #8e9775; background: #f0f3ec; color: #4d6145; font-weight: 700; }

        /* ── GAS dot ── */
        .gas-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; background: #C8B89A; flex-shrink: 0; }
        .gas-dot.ok { background: #8E9775; }
        .gas-dot.loading { background: #C4A87A; animation: blink 0.8s infinite; }
        .gas-dot.error { background: #C4928A; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Toast ── */
        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #7A6550; color: white; padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── API Modal ── */
        .api-modal { display: none; position: fixed; inset: 0; background: rgba(61,46,30,0.45); backdrop-filter: blur(6px); z-index: 400; align-items: center; justify-content: center; }
        .api-modal.show { display: flex; }
        .api-modal-box { background: #FAF7F2; border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; margin: 16px; border: 1px solid #DDD0BC; }

        /* ── 篩選列 ── */
        .filter-bar { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; padding: 14px 18px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(122,101,80,0.06); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
        .search-wrap { position: relative; min-width: 200px; }
        .search-wrap input { padding-left: 34px; }
        .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: #A89278; }

        /* ── 低庫存警示列 ── */
        .alert-banner { background: rgba(196,146,138,0.12); border: 1px solid rgba(196,146,138,0.3); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: none; }
        .alert-banner-title { font-size: 12px; font-weight: 700; color: #C4928A; margin-bottom: 6px; }
        .alert-chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .alert-chip { font-size: 11px; font-weight: 600; background: rgba(196,146,138,0.15); color: #C4928A; border-radius: 8px; padding: 4px 10px; }

        /* ── 庫存表格 ── */
        .inv-table-wrap { background: #FAF7F2; border-radius: 16px; border: 1px solid #DDD0BC; overflow: hidden; box-shadow: 0 1px 4px rgba(122,101,80,0.06); }
        .inv-table { width: 100%; border-collapse: collapse; }
        .inv-table th { background: #F5EFE6; padding: 12px 16px; font-size: 10px; font-weight: 700; color: #A89278; letter-spacing: 0.08em; text-transform: uppercase; text-align: left; border-bottom: 1px solid #DDD0BC; }
        .inv-table th.center { text-align: center; }
        .inv-table td { padding: 13px 16px; border-bottom: 1px solid #F5EFE6; font-size: 13px; vertical-align: middle; }
        .inv-table tr:last-child td { border-bottom: none; }
        .inv-table tr:hover td { background: rgba(0,0,0,0.015); }
        .prod-name { font-weight: 700; color: #3D2E1E; }
        .prod-cat { display: inline-block; font-size: 10px; font-weight: 700; color: #8e9775; background: #f0f3ec; border-radius: 5px; padding: 2px 7px; margin-top: 3px; }

        /* ── 庫存格 ── */
        .stock-cell { text-align: center; }
        .stock-control { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .stock-btn { width: 26px; height: 26px; border: 1.5px solid #DDD0BC; background: #F5EFE6; border-radius: 7px; cursor: pointer; font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.12s; color: #7A6550; font-weight: 700; padding: 0; }
        .stock-btn:hover { background: #EDE5D8; border-color: #C4A87A; }
        .stock-btn.minus:hover { background: rgba(196,146,138,0.15); border-color: #C4928A; color: #C4928A; }
        .stock-val { font-size: 15px; font-weight: 800; color: #3D2E1E; min-width: 28px; text-align: center; }
        .stock-val.low { color: #C4928A; }

        /* ── 空狀態 ── */
        .empty-state { text-align: center; padding: 60px 20px; color: #A89278; }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty-text { font-size: 14px; }
        .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid #DDD0BC; border-top-color: #8e9775; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 手動調整 Modal ── */
        .adj-modal { display: none; position: fixed; inset: 0; background: rgba(61,46,30,0.45); backdrop-filter: blur(6px); z-index: 400; align-items: center; justify-content: center; }
        .adj-modal.show { display: flex; }
        .adj-box { background: #FAF7F2; border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; margin: 16px; border: 1px solid #DDD0BC; }

        /* ── 報廢 Modal ── */
        .waste-modal { display: none; position: fixed; inset: 0; background: rgba(61,46,30,0.45); backdrop-filter: blur(6px); z-index: 400; align-items: center; justify-content: center; }
        .waste-modal.show { display: flex; }
        .waste-box { background: #FAF7F2; border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; margin: 16px; border: 1px solid rgba(196,146,138,0.5); }
        .btn-waste { background: rgba(196,146,138,0.15); color: #9d4a42; border: 1.5px solid rgba(196,146,138,0.4); border-radius: 10px; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .btn-waste:hover { background: rgba(196,146,138,0.28); border-color: #C4928A; }
        .waste-store-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
        .waste-store-btn { border: 1.5px solid #DDD0BC; background: #F5EFE6; border-radius: 10px; padding: 10px 6px; font-size: 12px; font-weight: 600; color: #7A6550; cursor: pointer; text-align: center; transition: all 0.15s; }
        .waste-store-btn.active { border-color: #C4928A; background: rgba(196,146,138,0.12); color: #9d4a42; }
        .waste-store-btn .store-stock { font-size: 18px; font-weight: 800; color: #3D2E1E; display: block; margin-bottom: 2px; }
        .waste-store-btn.active .store-stock { color: #C4928A; }

        /* ════════════════════════════════
           手機響應式設計 (≤768px)
        ════════════════════════════════ */
        .mobile-bottom-nav { display: none; }
        @media (max-width: 768px) {
            .side-nav { display: none !important; }
            .main-area { margin-left: 0 !important; }
            .main-header { padding: 0 16px; }
            .main-content { padding: 14px 14px 80px; }
            .store-chips { padding: 10px 14px; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .mobile-bottom-nav {
                display: flex; position: fixed;
                bottom: 0; left: 0; right: 0; height: 60px;
                background: #FAF7F2; border-top: 1.5px solid #DDD0BC;
                z-index: 150; padding-bottom: env(safe-area-inset-bottom, 0px);
                box-shadow: 0 -2px 8px rgba(61,46,30,0.08);
            }
            .mbn-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:#A89278; font-size:9px; font-weight:600; padding:6px 2px 4px; -webkit-tap-highlight-color:transparent; gap:2px; }
            .mbn-item.active { color: #6d7756; }
            .mbn-icon { font-size: 20px; line-height: 1; }
        }
    </style>
</head>
<body>
<div id="toast"></div>

<!-- API Modal -->
<div class="api-modal" id="apiModal">
    <div class="api-modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">⚙️ 連線設定</h3>
            <button onclick="closeApiModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <label style="font-size:11px;font-weight:600;color:#A89278;letter-spacing:0.04em;display:block;margin-bottom:6px;">API URL</label>
        <input type="text" id="apiInput" class="f-input" style="width:100%;margin-bottom:14px;" placeholder="貼上 GAS 部署網址">
        <button onclick="saveApi()" class="btn-primary" style="width:100%;">儲存並連線</button>
    </div>
</div>

<!-- 手動調整 Modal -->
<div class="adj-modal" id="adjModal">
    <div class="adj-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;" id="adjTitle">調整庫存</h3>
            <button onclick="closeAdjModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <p style="font-size:12px;color:#A89278;margin-bottom:14px;" id="adjSub"></p>
        <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;">調整數量（正數加庫存，負數減庫存）</label>
        <input type="number" id="adjDelta" class="f-input" style="width:100%;margin-bottom:14px;" placeholder="例：10 或 -5">
        <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;">備註（選填）</label>
        <input type="text" id="adjNote" class="f-input" style="width:100%;margin-bottom:18px;" placeholder="例：補貨、盤點修正">
        <div style="display:flex;gap:10px;">
            <button onclick="closeAdjModal()" class="btn-secondary" style="flex:1;">取消</button>
            <button onclick="submitAdj()" class="btn-primary" style="flex:2;" id="adjBtn">確認調整</button>
        </div>
    </div>
</div>

<!-- 報廢 Modal -->
<div class="waste-modal" id="wasteModal">
    <div class="waste-box" id="wasteBox">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">🗑 回報報廢</h3>
            <button onclick="closeWasteModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
        </div>
        <p id="wasteProductName" style="font-size:13px;font-weight:600;color:#6d7756;margin-bottom:16px;"></p>

        <div style="font-size:11px;font-weight:600;color:#A89278;margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase;">選擇點位</div>
        <div class="waste-store-grid" id="wasteStoreGrid"></div>

        <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;">報廢數量</label>
        <input type="number" id="wasteQty" class="f-input" style="width:100%;margin-bottom:12px;" min="1" placeholder="輸入要報廢的支數">
        <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;">備註（選填）</label>
        <input type="text" id="wasteNote" class="f-input" style="width:100%;margin-bottom:18px;" placeholder="例：凋謝、損壞">
        <div style="display:flex;gap:10px;">
            <button onclick="closeWasteModal()" class="btn-secondary" style="flex:1;">取消</button>
            <button onclick="submitWaste()" style="flex:2;background:#C4928A;color:white;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;" id="wasteBtn">確認報廢</button>
        </div>
    </div>
</div>

<!-- 側邊欄 -->
<nav class="side-nav">
    <div class="nav-brand">
        <div class="nav-brand-icon">🌸</div>
        <div>
            <div class="nav-brand-name">拾逅花事</div>
            <div class="nav-brand-sub">Moment Flor · POS</div>
        </div>
    </div>
    <div class="nav-items">
        <div class="nav-section-label">主要功能</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">🛒</span>收銀台</a>
        <a href="sales.html" class="nav-item"><span class="nav-icon">🔍</span>銷售紀錄</a>
        <div class="nav-section-label">管理工具</div>
        <a href="procurement.html" class="nav-item"><span class="nav-icon">🚚</span>進貨管理</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">🌹</span>商品管理</a>
        <a href="inventory.html" class="nav-item active"><span class="nav-icon">📦</span>庫存管理</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>後台報表</a>
    </div>
    <div class="nav-bottom">
        <div class="gas-status-bar">
            <span class="gas-dot" id="gasDot"></span>
            <span id="gasLabel">—</span>
            <span>GAS 連線</span>
            <button onclick="openApiModal()" title="API 設定">⚙️</button>
        </div>
    </div>
</nav>

<!-- 主區域 -->
<div class="main-area">
    <!-- Header -->
    <div class="main-header">
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="main-header-title">📦 庫存管理</div>
            <span id="productCount" style="background:#F5EFE6;color:#7A6550;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;">—</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <a href="procurement.html" class="btn-secondary" style="text-decoration:none;font-size:12px;">🚚 補貨記錄</a>
            <button onclick="loadProducts()" class="btn-primary" style="font-size:12px;padding:8px 16px;">重新整理</button>
        </div>
    </div>

    <!-- 主內容 -->
    <div class="main-content">

        <!-- 低庫存警示 -->
        <div class="alert-banner" id="alertBanner">
            <div class="alert-banner-title">⚠️ 低庫存警示（庫存 ≤ 3）</div>
            <div class="alert-chips" id="alertChips"></div>
        </div>

        <!-- 篩選列 -->
        <div class="filter-bar">
            <div class="filter-chips" id="catChips">
                <button class="chip active" onclick="setCat(this,'全部')">全部</button>
                <button class="chip" onclick="setCat(this,'主花')">主花</button>
                <button class="chip" onclick="setCat(this,'配花')">配花</button>
                <button class="chip" onclick="setCat(this,'葉材')">葉材</button>
                <button class="chip" onclick="setCat(this,'花束')">花束</button>
                <button class="chip" onclick="setCat(this,'花瓶')">花瓶</button>
                <button class="chip" onclick="setCat(this,'其他')">其他</button>
            </div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="f-input" placeholder="搜尋商品..." oninput="renderTable()" style="min-width:180px;">
            </div>
        </div>

        <!-- 庫存表格 -->
        <div id="inventoryContainer">
            <div class="empty-state"><div class="spinner"></div></div>
        </div>

    </div>
</div>

<script>
let API_URL     = localStorage.getItem('moment_flor_api') || '';
let allProducts = [];
let currentCat  = '全部';
let adjTarget   = null; // { id, store, name, currentVal }

// ── API Modal ──
function openApiModal() {
    document.getElementById('apiInput').value = API_URL;
    document.getElementById('apiModal').classList.add('show');
}
function closeApiModal() { document.getElementById('apiModal').classList.remove('show'); }
document.getElementById('apiModal').addEventListener('click', e => { if (e.target === document.getElementById('apiModal')) closeApiModal(); });
function saveApi() {
    const v = document.getElementById('apiInput').value.trim();
    if (!v) return;
    localStorage.setItem('moment_flor_api', v);
    API_URL = v;
    closeApiModal();
    loadProducts();
}

// ── GAS 狀態 ──
function setGas(state) {
    const dot = document.getElementById('gasDot');
    const lbl = document.getElementById('gasLabel');
    dot.className = 'gas-dot ' + state;
    lbl.innerText = state === 'loading' ? '同步中' : state === 'ok' ? '正常' : '錯誤';
}

// ── 分類篩選 ──
function setCat(btn, cat) {
    document.querySelectorAll('#catChips .chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    renderTable();
}

// ── 載入商品 ──
async function loadProducts() {
    if (!API_URL) {
        document.getElementById('inventoryContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚙️</div>
                <div class="empty-text">請先設定 GAS API 網址</div>
                <button onclick="openApiModal()" class="btn-primary" style="margin-top:16px;">設定 API</button>
            </div>`;
        return;
    }
    setGas('loading');
    document.getElementById('inventoryContainer').innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
    try {
        const res  = await fetch(`${API_URL}?action=getProducts`);
        const data = await res.json();
        allProducts = Array.isArray(data) ? data : (data.products || data.data || []);
        setGas('ok');
        renderTable();
        renderAlerts();
    } catch(e) {
        setGas('error');
        document.getElementById('inventoryContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">❌</div>
                <div class="empty-text" style="color:#C4928A;">載入失敗，請確認 API 連線</div>
                <button onclick="loadProducts()" class="btn-secondary" style="margin-top:16px;">重試</button>
            </div>`;
    }
}

// ── 低庫存警示 ──
function renderAlerts() {
    const LOW = 3;
    const alerts = [];
    allProducts.forEach(p => {
        const name = p.name || p.productName || p.商品名稱 || '未命名';
        const kh = Number(p.stockKH || p.庫存KH || 0);
        const tn = Number(p.stockTN || p.庫存TN || 0);
        const es = Number(p.stockES || p.庫存ES || 0);
        if (kh <= LOW) alerts.push(`${name} (高雄 ${kh})`);
        if (tn <= LOW) alerts.push(`${name} (台南 ${tn})`);
        if (es <= LOW) alerts.push(`${name} (誠品 ${es})`);
    });
    const banner = document.getElementById('alertBanner');
    if (alerts.length) {
        document.getElementById('alertChips').innerHTML = alerts.map(a => `<span class="alert-chip">${escHtml(a)}</span>`).join('');
        banner.style.display = 'block';
    } else {
        banner.style.display = 'none';
    }
}

// ── 渲染表格 ──
function renderTable() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    let list = allProducts;
    if (currentCat !== '全部') list = list.filter(p => (p.category || p.分類 || '') === currentCat);
    if (q) list = list.filter(p => (p.name || p.productName || p.商品名稱 || '').toLowerCase().includes(q));

    document.getElementById('productCount').innerText = list.length + ' 項商品';

    if (!list.length) {
        document.getElementById('inventoryContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🌸</div>
                <div class="empty-text">${q || currentCat !== '全部' ? '查無符合的商品' : '還沒有商品'}</div>
            </div>`;
        return;
    }

    const rows = list.map(p => {
        const id   = p.id || p.productId || p.商品ID || '';
        const name = escHtml(p.name || p.productName || p.商品名稱 || '未命名');
        const cat  = escHtml(p.category || p.分類 || '');
        const kh   = Number(p.stockKH || p.庫存KH || 0);
        const tn   = Number(p.stockTN || p.庫存TN || 0);
        const es   = Number(p.stockES || p.庫存ES || 0);
        const total = kh + tn + es;
        const pJson = escHtml(JSON.stringify(p));

        return `<tr>
            <td>
                <div class="prod-name">${name}</div>
                <span class="prod-cat">${cat}</span>
            </td>
            <td class="stock-cell">
                <div class="stock-control">
                    <button class="stock-btn minus" onclick="quickAdj('${escHtml(id)}','KH',-1,'${name}',${kh})" title="減 1">−</button>
                    <span class="stock-val ${kh <= 3 ? 'low' : ''}" id="kh_${escHtml(id)}">${kh}</span>
                    <button class="stock-btn plus" onclick="quickAdj('${escHtml(id)}','KH',+1,'${name}',${kh})" title="加 1">＋</button>
                </div>
            </td>
            <td class="stock-cell">
                <div class="stock-control">
                    <button class="stock-btn minus" onclick="quickAdj('${escHtml(id)}','TN',-1,'${name}',${tn})" title="減 1">−</button>
                    <span class="stock-val ${tn <= 3 ? 'low' : ''}" id="tn_${escHtml(id)}">${tn}</span>
                    <button class="stock-btn plus" onclick="quickAdj('${escHtml(id)}','TN',+1,'${name}',${tn})" title="加 1">＋</button>
                </div>
            </td>
            <td class="stock-cell">
                <div class="stock-control">
                    <button class="stock-btn minus" onclick="quickAdj('${escHtml(id)}','ES',-1,'${name}',${es})" title="減 1">−</button>
                    <span class="stock-val ${es <= 3 ? 'low' : ''}" id="es_${escHtml(id)}">${es}</span>
                    <button class="stock-btn plus" onclick="quickAdj('${escHtml(id)}','ES',+1,'${name}',${es})" title="加 1">＋</button>
                </div>
            </td>
            <td style="text-align:center;">
                <span style="font-size:14px;font-weight:800;color:#6d7756;">${total}</span>
            </td>
            <td style="text-align:center;">
                <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
                    <button onclick='openAdjModal(${pJson})' class="btn-secondary" style="font-size:11px;padding:6px 10px;">手動調整</button>
                    <button onclick='openWasteModal(${pJson})' class="btn-waste">🗑 報廢</button>
                </div>
            </td>
        </tr>`;
    }).join('');

    document.getElementById('inventoryContainer').innerHTML = `
        <div class="inv-table-wrap">
            <table class="inv-table">
                <thead>
                    <tr>
                        <th>商品</th>
                        <th class="center">高雄</th>
                        <th class="center">台南</th>
                        <th class="center">誠品</th>
                        <th class="center">總計</th>
                        <th class="center">操作</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
}

// ── 快速 +1 / -1 ──
async function quickAdj(id, store, delta, name, currentVal) {
    if (delta < 0 && currentVal <= 0) { showToast('庫存已為 0，無法再減'); return; }
    if (!API_URL) { showToast('請先設定 API 網址'); return; }

    setGas('loading');
    try {
        const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'adjustStock', data: { id, store, delta } }) });
        const result = await res.json();
        if (result.success) {
            setGas('ok');
            // 樂觀更新
            const p = allProducts.find(p => (p.id || p.productId) == id);
            if (p) {
                const key = store === 'KH' ? 'stockKH' : store === 'TN' ? 'stockTN' : 'stockES';
                const oldKey = store === 'KH' ? '庫存KH' : store === 'TN' ? '庫存TN' : '庫存ES';
                const newVal = Math.max(0, Number(p[key] || p[oldKey] || 0) + delta);
                p[key] = newVal;
                const el = document.getElementById(`${store.toLowerCase()}_${id}`);
                if (el) {
                    el.innerText = newVal;
                    el.className = 'stock-val' + (newVal <= 3 ? ' low' : '');
                }
            }
            renderAlerts();
        } else {
            setGas('error');
            showToast('調整失敗：' + (result.error || ''));
        }
    } catch(e) {
        setGas('error');
        showToast('連線失敗');
    }
}

// ── 手動調整 Modal ──
function openAdjModal(p) {
    adjTarget = p;
    const name = p.name || p.productName || p.商品名稱 || '未命名';
    document.getElementById('adjTitle').innerText = '手動調整庫存';
    document.getElementById('adjSub').innerText = name;
    document.getElementById('adjDelta').value = '';
    document.getElementById('adjNote').value = '';

    // 動態選點位
    document.getElementById('adjModal').innerHTML = `
        <div class="adj-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <h3 style="font-weight:700;font-size:15px;color:#3D2E1E;">手動調整庫存</h3>
                <button onclick="closeAdjModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#A89278;">✕</button>
            </div>
            <p style="font-size:13px;font-weight:600;color:#6d7756;margin-bottom:16px;">${escHtml(name)}</p>
            <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;">點位</label>
            <select id="adjStore" class="f-input" style="width:100%;margin-bottom:12px;">
                <option value="KH">高雄 (KH)</option>
                <option value="TN">台南 (TN)</option>
                <option value="ES">誠品 (ES)</option>
            </select>
            <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;">調整數量（正數加庫存，負數減庫存）</label>
            <input type="number" id="adjDelta" class="f-input" style="width:100%;margin-bottom:12px;" placeholder="例：10 或 -5">
            <label style="font-size:11px;font-weight:600;color:#A89278;display:block;margin-bottom:6px;">備註（選填）</label>
            <input type="text" id="adjNote" class="f-input" style="width:100%;margin-bottom:18px;" placeholder="例：補貨、盤點修正">
            <div style="display:flex;gap:10px;">
                <button onclick="closeAdjModal()" class="btn-secondary" style="flex:1;">取消</button>
                <button onclick="submitAdj()" class="btn-primary" style="flex:2;" id="adjBtn">確認調整</button>
            </div>
        </div>`;
    document.getElementById('adjModal').classList.add('show');
}
function closeAdjModal() { document.getElementById('adjModal').classList.remove('show'); adjTarget = null; }
document.getElementById('adjModal').addEventListener('click', e => { if (e.target === document.getElementById('adjModal')) closeAdjModal(); });

async function submitAdj() {
    if (!adjTarget) return;
    const store = document.getElementById('adjStore') ? document.getElementById('adjStore').value : 'KH';
    const delta = parseInt(document.getElementById('adjDelta').value);
    const note  = document.getElementById('adjNote').value.trim();
    if (isNaN(delta) || delta === 0) { showToast('請輸入非零的調整數量'); return; }
    if (!API_URL) { showToast('請先設定 API 網址'); return; }

    const btn = document.getElementById('adjBtn');
    btn.disabled = true; btn.innerText = '調整中...';
    setGas('loading');

    const id = adjTarget.id || adjTarget.productId || adjTarget.商品ID;
    try {
        const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'adjustStock', data: { id, store, delta, note } }) });
        const result = await res.json();
        if (result.success) {
            setGas('ok');
            showToast('✅ 庫存已調整');
            closeAdjModal();
            await loadProducts();
        } else {
            setGas('error');
            showToast('調整失敗：' + (result.error || ''));
            btn.disabled = false; btn.innerText = '確認調整';
        }
    } catch(e) {
        setGas('error');
        showToast('連線失敗');
        btn.disabled = false; btn.innerText = '確認調整';
    }
}

// ── 報廢 Modal ──
let wasteTarget = null;
let wasteStore  = 'KH';

function openWasteModal(p) {
    wasteTarget = p;
    wasteStore  = 'KH';
    const name = p.name || p.productName || '未命名';
    const kh   = Number(p.stockKH || 0);
    const tn   = Number(p.stockTN || 0);
    const es   = Number(p.stockES || 0);

    document.getElementById('wasteProductName').innerText = name;
    document.getElementById('wasteQty').value  = '';
    document.getElementById('wasteNote').value = '';
    document.getElementById('wasteBtn').disabled = false;
    document.getElementById('wasteBtn').innerText = '確認報廢';

    // 三個點位選擇按鈕
    const stores = [
        { code:'KH', label:'高雄', stock: kh },
        { code:'TN', label:'台南', stock: tn },
        { code:'ES', label:'誠品', stock: es },
    ];
    document.getElementById('wasteStoreGrid').innerHTML = stores.map(s => `
        <button class="waste-store-btn ${s.code === 'KH' ? 'active' : ''}"
            id="wasteSBtn_${s.code}"
            onclick="selectWasteStore('${s.code}',${s.stock})">
            <span class="store-stock" id="wasteStk_${s.code}">${s.stock}</span>
            ${s.label}
        </button>`).join('');

    document.getElementById('wasteModal').classList.add('show');
    setTimeout(() => document.getElementById('wasteQty').focus(), 150);
}

function selectWasteStore(code, stock) {
    wasteStore = code;
    document.querySelectorAll('.waste-store-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('wasteSBtn_' + code).classList.add('active');
}

function closeWasteModal() {
    document.getElementById('wasteModal').classList.remove('show');
    wasteTarget = null;
}
document.getElementById('wasteModal').addEventListener('click', e => {
    if (e.target === document.getElementById('wasteModal')) closeWasteModal();
});

async function submitWaste() {
    if (!wasteTarget) return;
    const qty  = parseInt(document.getElementById('wasteQty').value);
    const note = document.getElementById('wasteNote').value.trim() || '報廢';
    if (isNaN(qty) || qty <= 0) { showToast('請輸入報廢數量'); return; }
    if (!API_URL) { showToast('請先設定 API 網址'); return; }

    const storeLabel = wasteStore === 'KH' ? '高雄FOCUS 13' : wasteStore === 'TN' ? '台南FOCUS' : '誠品生活台南';
    const id   = wasteTarget.id || wasteTarget.productId;
    const name = wasteTarget.name || wasteTarget.productName || '';
    const stockKey = wasteStore === 'KH' ? 'stockKH' : wasteStore === 'TN' ? 'stockTN' : 'stockES';
    const curStock = Number(wasteTarget[stockKey] || 0);

    if (qty > curStock) {
        showToast(`報廢數量（${qty}）超過 ${storeLabel} 現有庫存（${curStock}）`);
        return;
    }

    const btn = document.getElementById('wasteBtn');
    btn.disabled = true; btn.innerText = '記錄中...';

    try {
        const res    = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
            action: 'reportWaste',
            data: { id, name, store: storeLabel, qty, note }
        })});
        const result = await res.json();
        if (result.success) {
            showToast(`✅ ${name} ×${qty} 已記錄報廢（${storeLabel}）`);
            // 樂觀更新庫存顯示
            const p = allProducts.find(p => (p.id || p.productId) == id);
            if (p) {
                p[stockKey] = Math.max(0, curStock - qty);
                const el = document.getElementById(`${wasteStore.toLowerCase()}_${id}`);
                if (el) {
                    el.innerText   = p[stockKey];
                    el.className   = 'stock-val' + (p[stockKey] <= 3 ? ' low' : '');
                }
                // 更新 modal 裡的庫存數字
                const stkEl = document.getElementById('wasteStk_' + wasteStore);
                if (stkEl) stkEl.innerText = p[stockKey];
                wasteTarget[stockKey] = p[stockKey];
            }
            renderAlerts();
            closeWasteModal();
        } else {
            showToast('報廢記錄失敗：' + (result.error || ''));
            btn.disabled = false; btn.innerText = '確認報廢';
        }
    } catch(e) {
        showToast('連線失敗');
        btn.disabled = false; btn.innerText = '確認報廢';
    }
}

// ── 工具 ──
function escHtml(s) {
    if (typeof s !== 'string') s = String(s);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
let _toastTimer;
function showToast(msg, dur=2500) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ── 初始化 ──
window.onload = function() {
    if (!API_URL) { setGas('error'); document.getElementById('gasLabel').innerText = '未設定'; }
    loadProducts();
};
